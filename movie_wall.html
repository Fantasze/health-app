<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 我的电影库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.8;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 30px auto;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 5px;
        }

        .stat-label {
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
        }

        .search-box {
            max-width: 600px;
            margin: 30px auto;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: none;
            border-radius: 30px;
            font-size: 1em;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .search-box input:focus {
            outline: none;
            background: white;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .movie-poster {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            position: relative;
            overflow: hidden;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .movie-poster .placeholder {
            color: white;
            opacity: 0.5;
        }

        .movie-poster .quality-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #00d9ff;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7em;
            font-weight: bold;
            border: 1px solid #00d9ff;
        }

        .movie-type {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,165,0,0.9);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7em;
            font-weight: bold;
        }

        .movie-info {
            padding: 15px;
            background: rgba(0,0,0,0.5);
        }

        .movie-title {
            color: white;
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: rgba(255,255,255,0.6);
        }

        .movie-year {
            color: #00d9ff;
        }

        .movie-quality {
            background: rgba(0,217,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }

        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #00d9ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #00d9ff;
            color: #1a1a2e;
        }

        .no-movies {
            text-align: center;
            color: rgba(255,255,255,0.5);
            padding: 50px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 我的电影库</h1>
        <p>NAS 私人影院</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="total-movies">0</div>
            <div class="stat-label">电影总数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="total-size">0 GB</div>
            <div class="stat-label">总容量</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="hd-movies">0</div>
            <div class="stat-label">高清电影</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="series-count">0</div>
            <div class="stat-label">剧集系列</div>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 搜索电影...">
    </div>

    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="2024">2024</button>
        <button class="filter-btn" data-filter="2023">2023</button>
        <button class="filter-btn" data-filter="2020s">2020s</button>
        <button class="filter-btn" data-filter="2010s">2010s</button>
        <button class="filter-btn" data-filter="2000s">2000s</button>
        <button class="filter-btn" data-filter="1990s">1990s</button>
        <button class="filter-btn" data-filter="4k">4K</button>
        <button class="filter-btn" data-filter="hd">HD</button>
    </div>

    <div class="movie-grid" id="movie-grid">
        <div class="loading">
            <div class="loading-spinner"></div>
            <p>正在扫描电影库...</p>
        </div>
    </div>

        // 如果没有 JSON 数据，使用默认数据
        function loadMovies() {
            if (sampleMovies.length === 0) {
                sampleMovies = defaultMovies;
            }
            allMovies = sampleMovies;
            displayMovies(allMovies);
            updateStats();
        }

        // 初始化时加载
        loadMoviesFromJSON();

        // 加载电影
        function loadMovies() {
            allMovies = sampleMovies;
            displayMovies(allMovies);
            updateStats();
        }

        // 显示电影
        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            
            if (movies.length === 0) {
                grid.innerHTML = '<div class="no-movies">😕 没有找到电影</div>';
                return;
            }

            grid.innerHTML = movies.map(movie => `
                <div class="movie-card" onclick="playMovie('${movie.path}')">
                    <div class="movie-poster">
                        ${movie.type === 'series' ? '<span class="movie-type">📺 剧集</span>' : ''}
                        <span class="quality-badge">${movie.quality}</span>
                        ${movie.poster ? `<img src="${movie.poster}" alt="${movie.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                        <span class="placeholder" style="${movie.poster ? 'display:none' : ''}">🎬</span>
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-meta">
                            <span class="movie-year">${movie.year}</span>
                            <span class="movie-quality">${movie.quality}</span>
                        </div>
                        ${movie.size ? `<div style="margin-top:5px; font-size:0.75em; color:rgba(255,255,255,0.5)">💾 ${movie.size}</div>` : ''}
                        ${movie.episodes ? `<div style="margin-top:5px; font-size:0.75em; color:rgba(255,255,255,0.5)">📺 ${movie.episodes}集</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            const total = allMovies.length;
            const hdCount = allMovies.filter(m => m.quality === '4K').length;
            const seriesCount = allMovies.filter(m => m.type === 'series').length;
            const totalSize = allMovies.reduce((sum, m) => {
                const sizeMatch = m.size?.match(/([\d.]+)\s*GB/);
                return sum + (sizeMatch ? parseFloat(sizeMatch[1]) : 3);
            }, 0);
            
            document.getElementById('total-movies').textContent = total;
            document.getElementById('total-size').textContent = totalSize.toFixed(0) + ' GB';
            document.getElementById('hd-movies').textContent = hdCount;
            document.getElementById('series-count').textContent = seriesCount;
        }

        // 播放电影
        function playMovie(path) {
            console.log('播放:', path);
            alert('准备播放：' + path + '\n\n（需要 VLC 或其他播放器支持）');
        }

        // 搜索功能
        document.getElementById('search-input').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const filtered = allMovies.filter(movie => 
                movie.title.toLowerCase().includes(query) ||
                movie.year.toString().includes(query)
            );
            displayMovies(filtered);
        });

        // 筛选功能
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const filter = this.dataset.filter;
                let filtered = allMovies;

                if (filter !== 'all') {
                    if (filter === '4k') {
                        filtered = allMovies.filter(m => m.quality === '4K');
                    } else if (filter === 'hd') {
                        filtered = allMovies.filter(m => m.quality === 'HD');
                    } else if (filter === '2024') {
                        filtered = allMovies.filter(m => m.year === 2024);
                    } else if (filter === '2023') {
                        filtered = allMovies.filter(m => m.year === 2023);
                    } else if (filter === '2020s') {
                        filtered = allMovies.filter(m => m.year >= 2020 && m.year < 2030);
                    } else if (filter === '2010s') {
                        filtered = allMovies.filter(m => m.year >= 2010 && m.year < 2020);
                    } else if (filter === '2000s') {
                        filtered = allMovies.filter(m => m.year >= 2000 && m.year < 2010);
                    } else if (filter === '1990s') {
                        filtered = allMovies.filter(m => m.year >= 1990 && m.year < 2000);
                    }
                }

                displayMovies(filtered);
            });
        });

    </script>
