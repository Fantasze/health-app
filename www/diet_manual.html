<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手动添加饮食</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f6fa;margin:0;padding:20px}.card{background:white;border-radius:16px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,.08)}h1{font-size:22px}.group{margin:14px 0}label{font-weight:bold;font-size:14px;display:block;margin-bottom:6px}input,textarea{width:100%;padding:14px;border:1px solid #ddd;border-radius:10px;font-size:16px}button,.btn{display:block;width:100%;text-align:center;text-decoration:none;border:0;border-radius:12px;padding:16px;margin-top:12px;font-size:16px;font-weight:bold}.save{background:#667eea;color:white}.back{background:#e5e7eb;color:#333}.status{background:#f0f9ff;border-left:4px solid #0ea5e9;padding:12px;border-radius:10px;margin-bottom:12px;color:#075985}.err{background:#fef2f2;color:#991b1b;border-left-color:#ef4444}
</style>
</head>
<body onload="init()">
<div class="card">
<h1>+ 手动添加饮食</h1>
<div id="status" class="status">v7.16 手动页加载中...</div>
<div class="group"><label>食物名称</label><input id="name" placeholder="例如：鸡饭"></div>
<div class="group"><label>卡路里 kcal</label><input id="calories" type="number" value="300"></div>
<div class="group"><label>蛋白质 g</label><input id="protein" type="number" value="10"></div>
<div class="group"><label>碳水 g</label><input id="carbs" type="number" value="30"></div>
<div class="group"><label>脂肪 g</label><input id="fat" type="number" value="8"></div>
<div class="group"><label>备注</label><textarea id="note"></textarea></div>
<button class="save" onclick="saveMeal()">保存饮食</button>
<a class="btn back" href="diet.html">返回饮食页</a>
</div>
<script>
var db=null;var user=null;function S(t,e){var x=document.getElementById('status');x.className='status'+(e?' err':'');x.innerHTML=t;}function init(){try{db=window.firebaseApp&&window.firebaseApp.db;user=JSON.parse(localStorage.getItem('userSession')||'null');if(!user){location.href='index.html';return;}S('v7.16 手动页 JS 已启动，可以保存。'+(db?'':' Firebase 未连接，会保存本机。'),!db);}catch(e){S('启动失败：'+e.message,true)}}function saveMeal(){try{var n=document.getElementById('name').value;if(!n){alert('请输入食物名称');return;}var today=(new Date()).toISOString().split('T')[0];var uid=(user&&(user.id||user.uid||user.email||user.phone))||'local-user';var rec={id:'local-'+(new Date()).getTime(),userId:uid,date:today,name:n,calories:parseInt(document.getElementById('calories').value,10)||0,protein:parseInt(document.getElementById('protein').value,10)||0,carbs:parseInt(document.getElementById('carbs').value,10)||0,fat:parseInt(document.getElementById('fat').value,10)||0,note:document.getElementById('note').value||'',source:'manual',createdAt:(new Date()).toISOString()};saveLocal(rec);if(db){db.collection('meals').add(rec).then(function(){localStorage.setItem('diet_last_save_status','已保存到本机和云端');location.href='diet.html?saved=1';}).catch(function(err){localStorage.setItem('diet_last_save_status','已保存到本机；云端失败：'+err.message);location.href='diet.html?saved=1';});}else{localStorage.setItem('diet_last_save_status','已保存到本机');location.href='diet.html?saved=1';}}catch(e){alert('保存失败：'+e.message)}}function saveLocal(rec){var key='local_meals_'+rec.date;var list=[];try{list=JSON.parse(localStorage.getItem(key)||'[]');}catch(e){list=[];}list.push(rec);localStorage.setItem(key,JSON.stringify(list));localStorage.setItem('local_meals_last_date',rec.date);}
</script>
</body></html>
