<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 健康管家</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .login-card{background:white;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center}
        .logo{font-size:64px;margin-bottom:20px}
        .title{font-size:24px;font-weight:700;color:#333;margin-bottom:10px}
        .subtitle{font-size:14px;color:#999;margin-bottom:30px}
        .input-group{margin-bottom:20px;text-align:left}
        .input-group label{display:block;font-size:13px;color:#666;margin-bottom:8px;font-weight:600}
        .input-group input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;transition:border-color 0.3s}
        .input-group input:focus{outline:none;border-color:#667eea}
        .btn{width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;margin-bottom:10px}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .btn-back{background:#f3f4f6;color:#666}
        .error-msg{background:#fee2e2;color:#dc2626;padding:12px;border-radius:8px;font-size:13px;margin-bottom:20px;display:none}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">⚙️</div>
        <h1 class="title">管理员登录</h1>
        <p class="subtitle">请输入管理员邮箱和密码</p>
        
        <div class="error-msg" id="errorMsg">❌ 登录失败，请重试</div>
        
        <div class="input-group">
            <label>管理员邮箱</label>
            <input type="email" id="adminEmail" placeholder="admin@example.com" autocomplete="username">
        </div>
        <div class="input-group">
            <label>管理员密码</label>
            <input type="password" id="adminPassword" placeholder="输入密码" autocomplete="current-password" onkeypress="if(event.keyCode===13)login()">
        </div>
        
        <button class="btn btn-primary" id="loginBtn" onclick="login()">🔐 登录</button>
        <button class="btn btn-back" onclick="window.location.href='index.html'">← 返回首页</button>
    </div>
    
    <script>
        async function login(){
            const email=document.getElementById('adminEmail').value.trim();
            const password=document.getElementById('adminPassword').value;
            const errorMsg=document.getElementById('errorMsg');
            const loginBtn=document.getElementById('loginBtn');

            errorMsg.style.display='none';

            if(!email||!password){
                errorMsg.textContent='❌ 请输入管理员邮箱和密码';
                errorMsg.style.display='block';
                return;
            }

            try{
                loginBtn.disabled=true;
                loginBtn.textContent='登录中...';
                await window.authUtils.loginAdmin(email,password);
                window.location.href='admin_dashboard.html';
            }catch(error){
                errorMsg.textContent='❌ '+error.message;
                errorMsg.style.display='block';
                document.getElementById('adminPassword').value='';
                document.getElementById('adminPassword').focus();
            }finally{
                loginBtn.disabled=false;
                loginBtn.textContent='🔐 登录';
            }
        }
        
        window.authUtils.waitForAuthReady().then(async user=>{
            if(!user)return;
            try{
                const adminDoc=await window.firebaseApp.db.collection('admins').doc(user.uid).get();
                if(adminDoc.exists){
                    window.location.href='admin_dashboard.html';
                }
            }catch(error){
                console.warn('管理员状态检查失败:',error);
            }
        });
    </script>
</body>
</html>
