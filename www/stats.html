<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计 - 健康管家</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;min-height:100vh;padding-bottom:70px}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px}
        .header h1{font-size:20px}
        .content{padding:20px}
        .card{background:white;border-radius:15px;padding:20px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
        .card h3{color:#333;font-size:17px;margin-bottom:15px}
        .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
        .stat-item{text-align:center;padding:20px;background:#f8f9fa;border-radius:12px}
        .stat-value{font-size:28px;font-weight:700;color:#667eea;margin-bottom:5px}
        .stat-label{font-size:12px;color:#999}
        .chart-placeholder{height:200px;background:#f8f9fa;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#999}
        .week-summary{margin-top:20px}
        .day-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee}
        .day-row:last-child{border-bottom:none}
        .day-name{font-weight:600}
        .day-value{color:#667eea}
        .nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -5px 20px rgba(0,0,0,0.1);z-index:100}
        .nav-item{text-align:center;color:#999;font-size:11px;cursor:pointer;text-decoration:none}
        .nav-item.active{color:#667eea}
        .nav-icon{font-size:22px;display:block;margin-bottom:2px}
        .progress-item{margin-bottom:20px}
        .progress-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px}
        .progress-bar{height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:5px}
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 统计</h1>
    </div>
    
    <div class="content">
        <div class="card">
            <h3>本周概览</h3>
            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-value" id="weekCalories">0</div>
                    <div class="stat-label">平均卡路里</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="weekWeight">--</div>
                    <div class="stat-label">当前体重</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="weekWorkouts">0</div>
                    <div class="stat-label">训练次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="weekDays">0</div>
                    <div class="stat-label">记录天数</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3>营养摄入进度</h3>
            <div class="progress-item">
                <div class="progress-label">
                    <span>蛋白质</span>
                    <span id="proteinProgress">0/150g</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="proteinBar" style="width:0%"></div>
                </div>
            </div>
            <div class="progress-item">
                <div class="progress-label">
                    <span>碳水</span>
                    <span id="carbsProgress">0/250g</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="carbsBar" style="width:0%"></div>
                </div>
            </div>
            <div class="progress-item">
                <div class="progress-label">
                    <span>脂肪</span>
                    <span id="fatProgress">0/65g</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="fatBar" style="width:0%"></div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3>近 7 天记录</h3>
            <div id="weekSummary" class="week-summary">
                <div class="day-row">
                    <span class="day-name">加载中...</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="nav-bar">
        <a href="app.html" class="nav-item"><span class="nav-icon">🏠</span>首页</a>
        <a href="diet.html" class="nav-item"><span class="nav-icon">🍽️</span>饮食</a>
        <div class="nav-item active"><span class="nav-icon">📊</span>统计</div>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>我的</a>
    </div>
    
    <script>
        let userSession=null;
        const db=window.firebaseApp.db;
        
        function checkLogin(){
            userSession=JSON.parse(localStorage.getItem('userSession'));
            if(!userSession){
                window.location.href='index.html';
            }
        }
        
        async function loadStats(){
            try{
                // 加载体重数据
                const weightsSnapshot=await db.collection('weights')
                    .where('userId','==',userSession.id)
                    .orderBy('date','desc')
                    .limit(1)
                    .get();
                
                if(!weightsSnapshot.empty){
                    const latestWeight=weightsSnapshot.docs[0].data();
                    document.getElementById('weekWeight').textContent=latestWeight.weight+'kg';
                }
                
                // 加载近 7 天饮食数据
                const today=new Date();
                const weekAgo=new Date(today.getTime()-7*24*60*60*1000);
                
                const mealsSnapshot=await db.collection('meals')
                    .where('userId','==',userSession.id)
                    .where('date','>=',weekAgo.toISOString().split('T')[0])
                    .get();
                
                let totalCal=0,totalDays=0;
                const dayData={};
                
                mealsSnapshot.docs.forEach(doc=>{
                    const meal=doc.data();
                    totalCal+=meal.calories||0;
                    if(!dayData[meal.date]){
                        dayData[meal.date]=1;
                        totalDays++;
                    }
                });
                
                const avgCal=totalDays>0?Math.round(totalCal/totalDays):0;
                document.getElementById('weekCalories').textContent=avgCal;
                document.getElementById('weekDays').textContent=totalDays;
                
                // 加载今日营养进度
                const todayStr=today.toISOString().split('T')[0];
                const todayMeals=await db.collection('meals')
                    .where('userId','==',userSession.id)
                    .where('date','==',todayStr)
                    .get();
                
                let pro=0,carb=0,fat=0;
                todayMeals.docs.forEach(doc=>{
                    const meal=doc.data();
                    pro+=meal.protein||0;
                    carb+=meal.carbs||0;
                    fat+=meal.fat||0;
                });
                
                document.getElementById('proteinProgress').textContent=`${pro}/150g`;
                document.getElementById('carbsProgress').textContent=`${carb}/250g`;
                document.getElementById('fatProgress').textContent=`${fat}/65g`;
                
                document.getElementById('proteinBar').style.width=Math.min(100,(pro/150)*100)+'%';
                document.getElementById('carbsBar').style.width=Math.min(100,(carb/250)*100)+'%';
                document.getElementById('fatBar').style.width=Math.min(100,(fat/65)*100)+'%';
                
                // 加载近 7 天摘要
                loadWeekSummary();
                
            }catch(error){
                console.error('加载统计失败:',error);
            }
        }
        
        async function loadWeekSummary(){
            const today=new Date();
            const days=['日','一','二','三','四','五','六'];
            let html='';
            
            for(let i=6;i>=0;i--){
                const date=new Date(today.getTime()-i*24*60*60*1000);
                const dateStr=date.toISOString().split('T')[0];
                const dayName=i===0?'今天':`${days[date.getDay()]} (${date.getMonth()+1}/${date.getDate()})`;
                
                html+=`<div class="day-row">
                    <span class="day-name">${dayName}</span>
                    <span class="day-value" id="day-${dateStr}">-</span>
                </div>`;
            }
            
            document.getElementById('weekSummary').innerHTML=html;
            
            // 加载每天的卡路里
            const todayStr=today.toISOString().split('T')[0];
            const weekAgoStr=new Date(today.getTime()-6*24*60*60*1000).toISOString().split('T')[0];
            
            const mealsSnapshot=await db.collection('meals')
                .where('userId','==',userSession.id)
                .where('date','>=',weekAgoStr)
                .where('date','<=',todayStr)
                .get();
            
            const dayCalories={};
            mealsSnapshot.docs.forEach(doc=>{
                const meal=doc.data();
                dayCalories[meal.date]=(dayCalories[meal.date]||0)+(meal.calories||0);
            });
            
            for(let i=6;i>=0;i--){
                const date=new Date(today.getTime()-i*24*60*60*1000);
                const dateStr=date.toISOString().split('T')[0];
                const cal=dayCalories[dateStr]||0;
                const element=document.getElementById(`day-${dateStr}`);
                if(element){
                    element.textContent=cal>0?cal+' kcal':'-';
                }
            }
        }
        
        checkLogin();
        loadStats();
    </script>
</body>
</html>
