<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>📝 用户注册 - 健康管家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #666;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo .icon {
            font-size: 4em;
            display: block;
        }
        .logo h1 {
            color: var(--primary);
            font-size: 1.8em;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text);
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-group small {
            display: block;
            margin-top: 5px;
            color: #666;
            font-size: 0.85em;
        }
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #9e9e9e, #757575);
        }
        .error-message {
            background: #ffebee;
            color: #f44336;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        .success-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="register_choice.html" class="back-btn">
            <span>←</span>
            <span>返回</span>
        </a>

        <div id="registerForm">
            <div class="logo">
                <span class="icon">👤</span>
                <h1>学员注册</h1>
                <p>创建你的健康档案</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="name">姓名 *</label>
                    <input type="text" id="name" name="name" required placeholder="请输入您的姓名">
                </div>

                <div class="form-group">
                    <label for="email">电子邮箱 *</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                    <small>用于登录和接收通知</small>
                </div>

                <div class="form-group">
                    <label for="phone">电话号码 *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="012-3456789">
                </div>

                <div class="form-group">
                    <label for="password">密码 *</label>
                    <input type="password" id="password" name="password" required placeholder="至少 6 位字符" minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认密码 *</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="再次输入密码">
                </div>

                <div class="form-group">
                    <label for="goal">健康目标 *</label>
                    <select id="goal" name="goal" required>
                        <option value="">请选择您的目标</option>
                        <option value="lose_weight">减脂瘦身</option>
                        <option value="gain_muscle">增肌塑形</option>
                        <option value="maintain">保持健康</option>
                        <option value="improve_fitness">提升体能</option>
                    </select>
                </div>

                <button type="submit" class="btn">
                    <span>✅</span>
                    <span>创建账号</span>
                </button>

                <button type="button" class="btn btn-secondary" onclick="goBack()" style="margin-top: 10px;">
                    取消
                </button>
            </form>
        </div>

        <div id="successMessage" class="success-message">
            <div class="success-icon">✅</div>
            <h2 style="color: var(--primary); margin-bottom: 15px;">注册成功！</h2>
            <p style="color: #666; margin-bottom: 20px;">
                账号已创建，现在可以登录了
            </p>
            <button class="btn" onclick="goToLogin()">
                前往登录
            </button>
        </div>
    </div>

    <script>
        function handleRegister(event) {
            event.preventDefault();
            
            const form = event.target;
            const formData = new FormData(form);
            
            const password = formData.get('password');
            const confirmPassword = formData.get('confirmPassword');
            
            if (password !== confirmPassword) {
                showError('❌ 两次输入的密码不一致');
                return;
            }
            
            const user = {
                id: 'user_' + Date.now(),
                name: formData.get('name'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                password: password,
                goal: formData.get('goal'),
                role: 'student',
                avatar: '👤',
                createdAt: new Date().toISOString()
            };
            
            console.log('📝 用户注册:', user);
            
            // 保存到本地存储
            const users = JSON.parse(localStorage.getItem('healthApp_users') || '[]');
            
            // 检查邮箱是否已存在
            const existing = users.find(u => u.email === user.email);
            if (existing) {
                showError('❌ 该邮箱已被注册');
                return;
            }
            
            users.push(user);
            localStorage.setItem('healthApp_users', JSON.stringify(users));
            
            // 显示成功消息
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('successMessage').classList.add('show');
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
        }
        
        function goBack() {
            window.location.href = 'register_choice.html';
        }
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
