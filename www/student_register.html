<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康管家 - 学员注册</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .register-card{background:white;border-radius:20px;padding:30px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .logo{font-size:48px;text-align:center;margin-bottom:10px}
        .title{font-size:24px;font-weight:700;color:#333;text-align:center;margin-bottom:30px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;color:#555;margin-bottom:8px;font-size:14px;font-weight:500}
        .form-group input,.form-group select{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px}
        .form-group input:focus,.form-group select:focus{border-color:#667eea;outline:none}
        .btn{width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;margin-bottom:10px}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed}
        .loading{display:none;text-align:center;padding:20px}
        .spinner{border:3px solid #f3f3f3;border-top:3px solid #667eea;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:0 auto 10px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">👤</div>
        <h1 class="title">学员注册</h1>
        
        <div id="registerForm">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="userName" placeholder="输入您的姓名">
            </div>
            
            <div class="form-group">
                <label>电话号码</label>
                <input type="tel" id="userPhone" placeholder="0123456789">
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="userPassword" placeholder="至少 6 位">
            </div>
            
            <div class="form-group">
                <label>身高 (cm)</label>
                <input type="number" id="userHeight" placeholder="170">
            </div>
            
            <div class="form-group">
                <label>当前体重 (kg)</label>
                <input type="number" id="userWeight" placeholder="70">
            </div>
            
            <div class="form-group">
                <label>目标体重 (kg)</label>
                <input type="number" id="userTargetWeight" placeholder="65">
            </div>
            
            <button class="btn btn-primary" id="registerBtn" onclick="register()">📝 注册</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div style="color:#666;font-size:14px">正在注册...</div>
        </div>
        
        <div style="margin-top:20px;text-align:center">
            <a href="index.html" style="color:#667eea;font-size:14px">← 返回首页</a>
        </div>
    </div>
    
    <script>
        async function register(){
            const name=document.getElementById('userName').value.trim();
            const phone=document.getElementById('userPhone').value.trim();
            const password=document.getElementById('userPassword').value;
            const height=parseFloat(document.getElementById('userHeight').value);
            const weight=parseFloat(document.getElementById('userWeight').value);
            const targetWeight=parseFloat(document.getElementById('userTargetWeight').value);
            
            if(!name||!phone||!password){
                alert('请填写所有必填字段');
                return;
            }
            
            if(password.length<6){
                alert('密码至少需要 6 位');
                return;
            }
            
            if(!height||!weight||!targetWeight){
                alert('请填写身高体重信息');
                return;
            }
            
            // 显示加载
            document.getElementById('registerForm').style.display='none';
            document.getElementById('loading').style.display='block';
            
            try{
                const db=window.firebaseApp.db;
                const auth=window.firebaseApp.auth;
                
                // 检查用户是否已存在
                const existingUser=await db.collection('users')
                    .where('phone','==',phone)
                    .where('role','==','student')
                    .limit(1)
                    .get();
                
                if(!existingUser.empty){
                    alert('❌ 该电话号码已注册');
                    document.getElementById('registerForm').style.display='block';
                    document.getElementById('loading').style.display='none';
                    return;
                }
                
                // 创建用户
                const userData={
                    name:name,
                    phone:phone,
                    role:'student',
                    height:height/100, // 转换为米
                    weight:weight,
                    targetWeight:targetWeight,
                    startWeight:weight,
                    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
                    lastLogin:new Date()
                };
                
                const docRef=await db.collection('users').add(userData);
                const userId=docRef.id;
                
                // 保存用户 session
                const userSession={
                    id:userId,
                    ...userData
                };
                localStorage.setItem('userSession',JSON.stringify(userSession));
                
                // 保存初始体重记录
                await db.collection('weights').add({
                    userId:userId,
                    weight:weight,
                    date:new Date().toISOString().split('T')[0],
                    createdAt:firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert('✅ 注册成功！\n\n欢迎 '+name+'！');
                window.location.href='app.html';
                
            }catch(error){
                console.error('注册错误:',error);
                alert('❌ 注册失败：'+error.message);
                document.getElementById('registerForm').style.display='block';
                document.getElementById('loading').style.display='none';
            }
        }
    </script>
</body>
</html>
