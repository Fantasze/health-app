<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>еҒҘеә·з®Ўе®¶ - еӯҰе‘ҳжіЁеҶҢ</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .register-card{background:white;border-radius:20px;padding:30px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .logo{font-size:48px;text-align:center;margin-bottom:10px}
        .title{font-size:24px;font-weight:700;color:#333;text-align:center;margin-bottom:30px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;color:#555;margin-bottom:8px;font-size:14px;font-weight:500}
        .form-group input,.form-group select{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px}
        .form-group input:focus,.form-group select:focus{border-color:#667eea;outline:none}
        .btn{width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;margin-bottom:10px}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed}
        .loading{display:none;text-align:center;padding:20px}
        .spinner{border:3px solid #f3f3f3;border-top:3px solid #667eea;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:0 auto 10px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">рҹ‘Ө</div>
        <h1 class="title">еӯҰе‘ҳжіЁеҶҢ</h1>
        
        <div id="registerForm">
            <div class="form-group">
                <label>е§“еҗҚ</label>
                <input type="text" id="userName" placeholder="иҫ“е…ҘжӮЁзҡ„е§“еҗҚ">
            </div>
            
            <div class="form-group">
                <label>з”өиҜқеҸ·з Ғ</label>
                <input type="tel" id="userPhone" placeholder="0123456789">
            </div>
            
            <div class="form-group">
                <label>з”өйӮ®пјҲз”ЁдәҺзҷ»еҪ•е’ҢйҮҚзҪ®еҜҶз Ғпјү</label>
                <input type="email" id="userEmail" placeholder="yourname@example.com">
            </div>
            
            <div class="form-group">
                <label>еҜҶз Ғ</label>
                <input type="password" id="userPassword" placeholder="иҮіе°‘ 6 дҪҚ">
            </div>
            
            <div class="form-group">
                <label>иә«й«ҳ (cm)</label>
                <input type="number" id="userHeight" placeholder="170">
            </div>
            
            <div class="form-group">
                <label>еҪ“еүҚдҪ“йҮҚ (kg)</label>
                <input type="number" id="userWeight" placeholder="70">
            </div>
            
            <div class="form-group">
                <label>зӣ®ж ҮдҪ“йҮҚ (kg)</label>
                <input type="number" id="userTargetWeight" placeholder="65">
            </div>
            
            <button class="btn btn-primary" id="registerBtn" onclick="register()">рҹ“қ жіЁеҶҢ</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div style="color:#666;font-size:14px">жӯЈеңЁжіЁеҶҢ...</div>
        </div>
        
        <div style="margin-top:20px;text-align:center">
            <a href="index.html" style="color:#667eea;font-size:14px">вҶҗ иҝ”еӣһйҰ–йЎө</a>
        </div>
    </div>
    
    <script>
        async function register(){
            const name=document.getElementById('userName').value.trim();
            const phone=document.getElementById('userPhone').value.trim();
            const email=document.getElementById('userEmail').value.trim();
            const password=document.getElementById('userPassword').value;
            const height=parseFloat(document.getElementById('userHeight').value);
            const weight=parseFloat(document.getElementById('userWeight').value);
            const targetWeight=parseFloat(document.getElementById('userTargetWeight').value);
            
            if(!name||!phone||!email||!password){
                alert('иҜ·еЎ«еҶҷжүҖжңүеҝ…еЎ«еӯ—ж®ө');
                return;
            }
            
            if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
                alert('иҜ·иҫ“е…Ҙжңүж•Ҳзҡ„з”өйӮ®ең°еқҖ');
                return;
            }
            
            if(password.length<6){
                alert('еҜҶз ҒиҮіе°‘йңҖиҰҒ 6 дҪҚ');
                return;
            }
            
            if(!height||!weight||!targetWeight){
                alert('иҜ·еЎ«еҶҷиә«й«ҳдҪ“йҮҚдҝЎжҒҜ');
                return;
            }
            
            // жҳҫзӨәеҠ иҪҪ
            document.getElementById('registerForm').style.display='none';
            document.getElementById('loading').style.display='block';
            
            try{
                const db=window.firebaseApp.db;
                const auth=window.firebaseApp.auth;
                
                // жЈҖжҹҘз”ЁжҲ·жҳҜеҗҰе·ІеӯҳеңЁ
                const existingUser=await db.collection('users')
                    .where('phone','==',phone)
                    .where('role','==','student')
                    .limit(1)
                    .get();
                
                if(!existingUser.empty){
                    alert('вқҢ иҜҘз”өиҜқеҸ·з Ғе·ІжіЁеҶҢ');
                    document.getElementById('registerForm').style.display='block';
                    document.getElementById('loading').style.display='none';
                    return;
                }
                
                // еҲӣе»ә Firebase Auth иҙҰеҸ·пјҲз”ЁдәҺзҷ»еҪ•е’ҢйҮҚзҪ®еҜҶз Ғпјү
                const credential=await auth.createUserWithEmailAndPassword(email,password);
                const firebaseUser=credential.user;
                
                // еҲӣе»әз”ЁжҲ·иө„ж–ҷ
                const userData={
                    id:firebaseUser.uid,
                    name:name,
                    phone:phone,
                    email:email,
                    role:'student',
                    height:height/100, // иҪ¬жҚўдёәзұі
                    weight:weight,
                    targetWeight:targetWeight,
                    startWeight:weight,
                    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
                    lastLogin:new Date()
                };
                
                await db.collection('users').doc(firebaseUser.uid).set(userData);
                const userId=firebaseUser.uid;
                
                // дҝқеӯҳз”ЁжҲ· session
                const userSession={...userData};
                localStorage.setItem('userSession',JSON.stringify(userSession));
                
                // дҝқеӯҳеҲқе§ӢдҪ“йҮҚи®°еҪ•
                await db.collection('weights').add({
                    userId:userId,
                    weight:weight,
                    date:new Date().toISOString().split('T')[0],
                    createdAt:firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert('вң… жіЁеҶҢжҲҗеҠҹпјҒ\n\nж¬ўиҝҺ '+name+'пјҒ');
                window.location.href='app.html';
                
            }catch(error){
                console.error('жіЁеҶҢй”ҷиҜҜ:',error);
                alert('вқҢ жіЁеҶҢеӨұиҙҘпјҡ'+error.message);
                document.getElementById('registerForm').style.display='block';
                document.getElementById('loading').style.display='none';
            }
        }
    </script>
</body>
</html>
