<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 健康管家</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:white;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center}
        .icon{font-size:64px;margin-bottom:20px}
        .title{font-size:24px;font-weight:700;color:#333;margin-bottom:10px}
        .subtitle{font-size:14px;color:#999;margin-bottom:30px}
        .input-group{margin-bottom:20px;text-align:left}
        .input-group label{display:block;font-size:13px;color:#666;margin-bottom:8px;font-weight:600}
        .input-group input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;transition:border-color 0.3s}
        .input-group input:focus{outline:none;border-color:#667eea}
        .btn{width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;margin-bottom:10px}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .btn-back{background:#f3f4f6;color:#666}
        .success-msg{background:#d1fae5;color:#059669;padding:15px;border-radius:10px;font-size:13px;margin-bottom:20px;display:none}
        .error-msg{background:#fee2e2;color:#dc2626;padding:15px;border-radius:10px;font-size:13px;margin-bottom:20px;display:none}
        .info-box{background:#f0f9ff;border-left:4px solid #0ea5e9;padding:15px;border-radius:8px;margin-bottom:20px;text-align:left}
        .info-box p{font-size:13px;color:#0369a1;line-height:1.6}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔐</div>
        <h1 class="title">忘记密码</h1>
        <p class="subtitle">输入注册电邮，我们会发送重置链接</p>
        
        <div class="success-msg" id="successMsg">
            ✅ 重置邮件已发送！<br>
            请检查您的电邮信箱，点击链接重置密码。<br>
            （也请检查垃圾邮件箱）
        </div>
        
        <div class="error-msg" id="errorMsg">❌ 发送失败，请重试</div>
        
        <div class="info-box">
            <p>💡 提示：</p>
            <p>• 重置链接会发送到您的注册电邮</p>
            <p>• 链接有效期为 1 小时</p>
            <p>• 如果没收到邮件，请检查垃圾邮件箱</p>
        </div>
        
        <div class="input-group">
            <label>注册电邮</label>
            <input type="email" id="email" placeholder="例如：yourname@example.com">
        </div>
        
        <button class="btn btn-primary" onclick="sendResetEmail()">📧 发送重置链接</button>
        <button class="btn btn-back" onclick="window.location.href='login.html'">← 返回登录</button>
    </div>
    
    <script>
        const auth=window.firebaseApp.auth;
        
        async function sendResetEmail(){
            const email=document.getElementById('email').value.trim();
            const successMsg=document.getElementById('successMsg');
            const errorMsg=document.getElementById('errorMsg');
            
            // 隐藏之前的消息
            successMsg.style.display='none';
            errorMsg.style.display='none';
            
            // 验证电邮
            if(!email){
                showError('请输入电邮地址');
                return;
            }
            
            if(!isValidEmail(email)){
                showError('请输入有效的电邮地址');
                return;
            }
            
            try{
                // 发送密码重置邮件
                await auth.sendPasswordResetEmail(email);
                
                // 显示成功消息
                successMsg.style.display='block';
                document.getElementById('email').value='';
                
            }catch(error){
                // 显示错误消息
                let errorMessage='发送失败，请重试';
                
                switch(error.code){
                    case 'auth/user-not-found':
                        errorMessage='此电邮未注册账号';
                        break;
                    case 'auth/invalid-email':
                        errorMessage='无效的电邮地址';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage='尝试次数过多，请稍后再试';
                        break;
                }
                
                showError(errorMessage);
            }
        }
        
        function isValidEmail(email){
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        
        function showError(message){
            const errorMsg=document.getElementById('errorMsg');
            errorMsg.textContent='❌ '+message;
            errorMsg.style.display='block';
        }
    </script>
</body>
</html>
