<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兑换销售码 - 健康管家</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:white;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center}
        .icon{font-size:64px;margin-bottom:20px}
        .title{font-size:24px;font-weight:700;color:#333;margin-bottom:10px}
        .subtitle{font-size:14px;color:#999;margin-bottom:30px}
        .form-group{margin-bottom:20px;text-align:left}
        .form-group label{display:block;font-size:13px;color:#666;margin-bottom:8px;font-weight:600}
        .form-group input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;text-transform:uppercase}
        .form-group input:focus{outline:none;border-color:#667eea}
        .btn{width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;margin-bottom:10px}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .btn-back{background:#f3f4f6;color:#666}
        .info-box{background:#f0f9ff;border-left:4px solid #0ea5e9;padding:15px;border-radius:8px;margin-top:20px;text-align:left}
        .info-box p{font-size:13px;color:#0369a1;line-height:1.6;margin:0}
        .success-box{background:#d1fae5;border-left:4px solid #059669;padding:15px;border-radius:8px;margin-top:20px;text-align:left;display:none}
        .success-box p{font-size:13px;color:#047857;line-height:1.6;margin:0}
        .error-box{background:#fee2e2;border-left:4px solid #dc2626;padding:15px;border-radius:8px;margin-top:20px;text-align:left;display:none}
        .error-box p{font-size:13px;color:#b91c1c;line-height:1.6;margin:0}
        .loading{display:none;text-align:center;padding:20px}
        .spinner{border:3px solid #f3f3f3;border-top:3px solid #667eea;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:0 auto 10px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎫</div>
        <h1 class="title">兑换销售码</h1>
        <p class="subtitle">输入销售码获得免费使用</p>
        
        <div id="redeemForm">
            <div class="form-group">
                <label>销售码</label>
                <input type="text" id="salesCode" placeholder="例如：COACH2026" style="text-transform:uppercase">
            </div>
            
            <button class="btn btn-primary" onclick="redeemCode()">💰 立即兑换</button>
            <button class="btn btn-back" onclick="window.location.href='login.html'">← 返回登录</button>
            
            <div class="info-box">
                <p>💡 <strong>提示：</strong><br>
                销售码由教练提供，输入后可获得免费使用权限。</p>
            </div>
            
            <div class="success-box" id="successBox">
                <p>✅ <strong>兑换成功！</strong><br>
                您已获得 <span id="freeDays">30</span> 天免费使用权限。<br>
                现在可以登录并使用所有功能！</p>
            </div>
            
            <div class="error-box" id="errorBox">
                <p id="errorMsg">❌ <strong>兑换失败</strong><br>
                请检查销售码是否正确。</p>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div style="color:#666;font-size:14px">正在验证销售码...</div>
        </div>
    </div>
    
    <script>
        const db=window.firebaseApp.db;
        
        async function redeemCode(){
            const salesCode=document.getElementById('salesCode').value.trim().toUpperCase();
            const successBox=document.getElementById('successBox');
            const errorBox=document.getElementById('errorBox');
            const errorMsg=document.getElementById('errorMsg');
            
            // 隐藏之前的消息
            successBox.style.display='none';
            errorBox.style.display='none';
            
            if(!salesCode){
                errorMsg.textContent='❌ 请输入销售码';
                errorBox.style.display='block';
                return;
            }
            
            // 显示加载
            document.getElementById('redeemForm').style.display='none';
            document.getElementById('loading').style.display='block';
            
            try{
                // 获取当前用户
                const userSession=JSON.parse(localStorage.getItem('userSession'));
                
                if(!userSession){
                    document.getElementById('redeemForm').style.display='block';
                    document.getElementById('loading').style.display='none';
                    errorMsg.textContent='❌ 请先登录再兑换\n或先注册账号';
                    errorBox.style.display='block';
                    return;
                }
                
                // 使用事务保证原子性
                await db.runTransaction(async (transaction) => {
                    // 查询销售码
                    const snapshot=await db.collection('salesCodes')
                        .where('code','==',salesCode)
                        .where('used','==',false)
                        .limit(1)
                        .get();
                    
                    if(snapshot.empty){
                        throw new Error('销售码无效或已被使用');
                    }
                    
                    const docRef=snapshot.docs[0].ref;
                    const salesData=snapshot.docs[0].data();
                    
                    // 检查用户是否已兑换
                    const userRef=db.collection('users').doc(userSession.id);
                    const userDoc=await transaction.get(userRef);
                    
                    if(userDoc.data().isPremium){
                        throw new Error('你已经有会员了，无法重复兑换');
                    }
                    
                    // 更新销售码状态为已使用
                    transaction.update(docRef, {
                        used:true,
                        usedBy:userSession.name||userSession.email,
                        usedDate:new Date().toISOString()
                    });
                    
                    // 更新用户信息，添加免费会员
                    const freeUntil=new Date();
                    freeUntil.setDate(freeUntil.getDate()+salesData.freeDays);
                    
                    transaction.update(userRef, {
                        isPremium:true,
                        premiumType:'free_trial',
                        freeDays:salesData.freeDays,
                        freeUntil:freeUntil.toISOString(),
                        salesCode:salesCode,
                        redeemedAt:new Date().toISOString()
                    });
                });
                
                // 更新本地 session
                userSession.isPremium=true;
                userSession.premiumType='free_trial';
                userSession.freeDays=30;
                userSession.freeUntil=new Date(Date.now()+30*24*60*60*1000).toISOString();
                localStorage.setItem('userSession',JSON.stringify(userSession));
                
                // 显示成功消息
                document.getElementById('loading').style.display='none';
                document.getElementById('redeemForm').style.display='block';
                document.getElementById('freeDays').textContent='30';
                successBox.style.display='block';
                
                // 3 秒后跳转到首页
                setTimeout(()=>{
                    window.location.href='app.html';
                },3000);
                
            }catch(error){
                console.error('兑换失败:',error);
                document.getElementById('redeemForm').style.display='block';
                document.getElementById('loading').style.display='none';
                errorMsg.textContent='❌ 兑换失败：'+error.message;
                errorBox.style.display='block';
            }
        }
        
        // 允许按 Enter 兑换
        document.addEventListener('keypress',function(e){
            if(e.key==='Enter'){
                redeemCode();
            }
        });
    </script>
</body>
</html>
