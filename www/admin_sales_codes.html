<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售码管理 - 健康管家</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;min-height:100vh;padding-bottom:70px}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:25px 20px 20px}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .header h1{font-size:22px}
        .logout-btn{color:white;text-decoration:none;font-size:14px;padding:8px 15px;border:1px solid rgba(255,255,255,0.5);border-radius:20px}
        .content{padding:20px}
        .card{background:white;border-radius:15px;padding:20px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .card h3{color:#333;font-size:17px}
        .btn{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .btn-success{background:#4ade80;color:white}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px}
        .stat-card{background:white;border-radius:15px;padding:15px;box-shadow:0 5px 15px rgba(0,0,0,0.08);text-align:center}
        .stat-value{font-size:24px;font-weight:700;color:#667eea}
        .stat-label{font-size:11px;color:#999;margin-top:5px}
        .code-list{max-height:400px;overflow-y:auto}
        .code-item{display:flex;justify-content:space-between;align-items:center;padding:15px;border-bottom:1px solid #f0f0f0}
        .code-item:last-child{border-bottom:none}
        .code-info{flex:1}
        .code-value{font-size:16px;font-weight:700;color:#667eea;font-family:monospace}
        .code-details{font-size:12px;color:#999;margin-top:5px}
        .code-status{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
        .code-status-active{background:#d1fae5;color:#059669}
        .code-status-used{background:#fee2e2;color:#dc2626}
        .btn-copy{background:#f3f4f6;color:#667eea;padding:6px 12px;font-size:12px}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
        .modal-content{background:white;border-radius:15px;padding:25px;max-width:400px;width:90%}
        .modal-title{font-size:18px;font-weight:700;margin-bottom:15px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;font-size:13px;color:#666;margin-bottom:5px}
        .form-group input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px}
        .modal-buttons{display:flex;gap:10px;margin-top:20px}
        .modal-btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
        .modal-btn-primary{background:#667eea;color:white}
        .modal-btn-secondary{background:#f3f4f6;color:#666}
        .nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -5px 20px rgba(0,0,0,0.1);z-index:100}
        .nav-item{text-align:center;color:#999;font-size:11px;cursor:pointer;text-decoration:none}
        .nav-item.active{color:#667eea}
        .nav-icon{font-size:22px;display:block;margin-bottom:2px}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4ade80;color:white;padding:12px 24px;border-radius:10px;z-index:2000;display:none}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <h1>💰 销售码管理</h1>
            <a href="index.html" class="logout-btn" onclick="logout()">登出</a>
        </div>
    </div>
    
    <div class="content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalCodes">0</div>
                <div class="stat-label">总销售码</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeCodes">0</div>
                <div class="stat-label">可用</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="usedCodes">0</div>
                <div class="stat-label">已使用</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="coachCodes">0</div>
                <div class="stat-label">教练专属</div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h3>🎫 销售码列表</h3>
                <button class="btn btn-primary" onclick="showGenerateModal()">+ 生成销售码</button>
            </div>
            <div class="code-list" id="codeList">
                <div style="text-align:center;padding:30px;color:#999">加载中...</div>
            </div>
        </div>
    </div>
    
    <!-- 生成销售码弹窗 -->
    <div class="modal" id="generateModal">
        <div class="modal-content">
            <div class="modal-title">🎫 生成销售码</div>
            <div class="form-group">
                <label>销售码（留空自动生成）</label>
                <input type="text" id="customCode" placeholder="例如：COACH2026 或留空自动生成">
            </div>
            <div class="form-group">
                <label>关联教练（可选）</label>
                <input type="text" id="coachName" placeholder="教练姓名">
            </div>
            <div class="form-group">
                <label>免费天数</label>
                <input type="number" id="freeDays" value="30" placeholder="例如：30">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeModal()">取消</button>
                <button class="modal-btn modal-btn-primary" onclick="generateCode()">生成</button>
            </div>
        </div>
    </div>
    
    <!-- Toast 提示 -->
    <div class="toast" id="toast">✅ 已复制到剪贴板</div>
    
    <div class="nav-bar">
        <div class="nav-item active"><span class="nav-icon">⚙️</span>管理</div>
        <a href="admin_dashboard.html" class="nav-item"><span class="nav-icon">📋</span>申请审核</a>
        <a href="admin_coach_registrations.html" class="nav-item"><span class="nav-icon">👨‍🏫</span>教练注册</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>首页</a>
    </div>
    
    <script>
        const db=window.firebaseApp.db;
        
        function logout(){
            window.authUtils.logoutAdmin();
        }
        
        async function initAdminPage(){
            const ok=await window.authUtils.requireAdmin();
            if(!ok)return;
            loadCodes();
        }
        
        async function loadCodes(){
            try{
                const snapshot=await db.collection('salesCodes')
                    .orderBy('createdAt','desc')
                    .get();
                
                const codes=snapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
                
                let total=codes.length;
                let active=codes.filter(c=>!c.used).length;
                let used=codes.filter(c=>c.used).length;
                let coach=codes.filter(c=>c.coachName).length;
                
                document.getElementById('totalCodes').textContent=total;
                document.getElementById('activeCodes').textContent=active;
                document.getElementById('usedCodes').textContent=used;
                document.getElementById('coachCodes').textContent=coach;
                
                const codeList=document.getElementById('codeList');
                
                if(codes.length===0){
                    codeList.innerHTML='<div style="text-align:center;padding:30px;color:#999">暂无销售码</div>';
                    return;
                }
                
                codeList.innerHTML=codes.map(code=>`
                    <div class="code-item">
                        <div class="code-info">
                            <div class="code-value">${code.code}</div>
                            <div class="code-details">
                                ${code.coachName?'👨‍🏫 '+code.coachName+' · ':''}
                                🎁 ${code.freeDays}天免费 · 
                                ${code.used?'👤 '+code.usedBy:'未使用'}
                            </div>
                        </div>
                        <div style="display:flex;gap:10px;align-items:center">
                            <span class="code-status ${code.used?'code-status-used':'code-status-active'}">
                                ${code.used?'已使用':'可用'}
                            </span>
                            ${!code.used?`<button class="btn btn-copy" onclick="copyCode('${code.code}')">复制</button>`:''}
                        </div>
                    </div>
                `).join('');
                
            }catch(error){
                console.error('加载销售码失败:',error);
            }
        }
        
        function showGenerateModal(){
            document.getElementById('generateModal').style.display='flex';
        }
        
        function closeModal(){
            document.getElementById('generateModal').style.display='none';
        }
        
        async function generateCode(){
            const customCode=document.getElementById('customCode').value.trim().toUpperCase();
            const coachName=document.getElementById('coachName').value.trim();
            const freeDays=parseInt(document.getElementById('freeDays').value)||30;
            
            // 生成或自定义销售码
            const code=customCode||'CODE'+Date.now().toString(36).toUpperCase();
            
            try{
                await db.collection('salesCodes').add({
                    code:code,
                    coachName:coachName||null,
                    freeDays:freeDays,
                    used:false,
                    usedBy:null,
                    usedDate:null,
                    createdAt:new Date().toISOString()
                });
                
                alert('✅ 销售码已生成！\n\n销售码：'+code+'\n免费天数：'+freeDays+'天'+(coachName?' · 教练：'+coachName:''));
                closeModal();
                loadCodes();
                
            }catch(error){
                alert('❌ 生成失败：'+error.message);
            }
        }
        
        function copyCode(code){
            navigator.clipboard.writeText(code).then(()=>{
                const toast=document.getElementById('toast');
                toast.style.display='block';
                setTimeout(()=>toast.style.display='none',2000);
            });
        }
        
        initAdminPage();
    </script>
</body>
</html>
