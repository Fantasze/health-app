<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 NAS 影片库 - 支持多音轨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #141414;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #e50914, #b20710);
            border-radius: 15px;
        }
        .header h1 { font-size: 2em; }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            width: 300px;
            background: #333;
            color: white;
        }
        .search-box button {
            padding: 12px 24px;
            background: white;
            color: #e50914;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #333;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #e50914;
        }
        .stat-label {
            color: #999;
            margin-top: 5px;
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .movie-card {
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .movie-card:hover {
            transform: scale(1.05);
        }
        .movie-poster {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #333, #444);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
        }
        .movie-info {
            padding: 15px;
        }
        .movie-title {
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-year {
            color: #999;
            font-size: 0.9em;
        }
        .movie-size {
            color: #e50914;
            font-size: 0.85em;
            margin-top: 5px;
        }
        .movie-audio {
            background: #4CAF50;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            display: inline-block;
            margin-top: 5px;
        }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 20px;
            background: #333;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }
        .filter-btn.active {
            background: #e50914;
        }
        
        /* 播放器样式 */
        .player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }
        .player-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
        }
        .player-overlay video {
            width: 100%;
            max-height: 70vh;
            border-radius: 12px;
        }
        .close-player {
            position: absolute;
            top: -40px;
            right: 0;
            background: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1001;
        }
        .close-player:hover {
            background: #e50914;
            color: white;
        }
        
        /* 音轨选择器 */
        .audio-controls {
            background: #333;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            width: 100%;
            max-width: 600px;
        }
        .audio-controls h3 {
            margin-bottom: 15px;
            color: #e50914;
        }
        .audio-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .audio-btn {
            padding: 10px 20px;
            background: #444;
            border: 2px solid #555;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .audio-btn:hover {
            background: #555;
        }
        .audio-btn.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }
        .audio-info {
            margin-top: 10px;
            padding: 10px;
            background: #222;
            border-radius: 8px;
            font-size: 0.9em;
            color: #999;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #999;
        }
        .config-panel {
            background: #333;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .config-panel h3 {
            margin-bottom: 15px;
            color: #e50914;
        }
        .config-panel input {
            padding: 10px;
            border: none;
            border-radius: 8px;
            margin: 5px;
            width: 400px;
            background: #444;
            color: white;
        }
        .config-panel button {
            padding: 10px 20px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .config-panel button:hover {
            background: #b20710;
        }
        
        /* 提示框 */
        .tooltip {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 1002;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 NAS 影片库</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索电影...">
            <button onclick="searchMovies()">搜索</button>
        </div>
    </div>

    <div class="config-panel">
        <h3>⚙️ NAS 配置</h3>
        <p style="margin-bottom:10px; color:#999;">选择你的 NAS 影片文件夹：</p>
        <button onclick="scanLocalFolder()" style="background:#4CAF50; margin-right:10px;">📁 扫描本地文件夹</button>
        <p style="margin-top:10px; color:#999; font-size:0.9em;">
            💡 提示：支持 MKV/MP4/AVI 等多音轨格式，播放时可切换国语/粤语/英语
        </p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="total-movies">0</div>
            <div class="stat-label">总电影数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="total-size">0 GB</div>
            <div class="stat-label">总容量</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="hd-movies">0</div>
            <div class="stat-label">高清影片</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="4k-movies">0</div>
            <div class="stat-label">4K 影片</div>
        </div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterMovies('all')">全部</button>
        <button class="filter-btn" onclick="filterMovies('4k')">4K</button>
        <button class="filter-btn" onclick="filterMovies('hd')">高清</button>
        <button class="filter-btn" onclick="filterMovies('multi-audio')">🎧 多音轨</button>
        <button class="filter-btn" onclick="filterMovies('recent')">最近</button>
    </div>

    <div class="movie-grid" id="movie-grid">
        <div class="loading">
            🎬 点击"扫描本地文件夹"开始扫描<br>
            <small style="color:#666;">支持多音轨切换 • 国语/粤语/英语</small>
        </div>
    </div>

    <!-- 播放器 -->
    <div class="player-overlay" id="player-overlay">
        <div class="player-container">
            <button class="close-player" onclick="closePlayer()">✕ 关闭</button>
            <video id="video-player" controls style="width:100%;">
                <source src="" type="video/mp4">
                您的浏览器不支持视频播放
            </video>
            
            <!-- 音轨控制 -->
            <div class="audio-controls" id="audio-controls" style="display:none;">
                <h3>🎧 选择音轨</h3>
                <div class="audio-buttons" id="audio-buttons"></div>
                <div class="audio-info" id="audio-info"></div>
            </div>
            
            <h2 id="playing-title" style="margin-top:20px; text-align:center;"></h2>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="tooltip" id="tooltip"></div>

    <script>
        let allMovies = [];
        let currentFilter = 'all';
        let currentMovieIndex = -1;

        // 扫描本地文件夹
        async function scanLocalFolder() {
            try {
                const input = document.createElement('input');
                input.type = 'file';
                input.webkitdirectory = true;
                input.multiple = true;

                input.onchange = async (e) => {
                    showTooltip('正在扫描文件，请稍候...');
                    
                    const files = Array.from(e.target.files);
                    const videoFiles = files.filter(f => 
                        f.name.match(/\.(mp4|mkv|avi|mov|wmv|flv|m4v)$/i)
                    );

                    allMovies = videoFiles.map(f => ({
                        name: f.name.replace(/\.[^/.]+$/, ""),
                        year: extractYear(f.name),
                        path: f.name,
                        size: (f.size / (1024 * 1024 * 1024)).toFixed(2),
                        sizeBytes: f.size,
                        is4K: f.name.toLowerCase().includes('4k') || f.name.toLowerCase().includes('2160p'),
                        isHD: f.name.toLowerCase().includes('1080p') || f.name.toLowerCase().includes('720p'),
                        file: f,
                        hasMultipleAudio: null, // 待检测
                        audioTracks: [] // 音轨列表
                    }));

                    showTooltip(`扫描完成！找到 ${allMovies.length} 部影片`);
                    displayMovies();
                    updateStats();
                    
                    // 自动检测前 10 部影片的多音轨信息
                    detectMultipleAudioForFirst10();
                };

                input.click();
            } catch (error) {
                alert('扫描失败：' + error.message);
            }
        }

        // 检测多音轨（前 10 部）
        async function detectMultipleAudioForFirst10() {
            showTooltip('正在检测多音轨影片...');
            
            for (let i = 0; i < Math.min(10, allMovies.length); i++) {
                const movie = allMovies[i];
                try {
                    const tracks = await getAudioTracks(movie.file);
                    movie.audioTracks = tracks;
                    movie.hasMultipleAudio = tracks.length > 1;
                } catch (e) {
                    movie.hasMultipleAudio = false;
                }
            }
            
            displayMovies();
            showTooltip('多音轨检测完成！🎧 绿色标记=多音轨');
        }

        // 获取音轨信息（需要浏览器支持）
        async function getAudioTracks(file) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                const url = URL.createObjectURL(file);
                
                video.preload = 'metadata';
                video.src = url;
                
                video.onloadedmetadata = () => {
                    const tracks = [];
                    
                    // 尝试从文件对象获取音轨
                    if (video.audioTracks && video.audioTracks.length > 0) {
                        for (let i = 0; i < video.audioTracks.length; i++) {
                            const track = video.audioTracks[i];
                            tracks.push({
                                id: i,
                                label: track.label || track.language || `音轨 ${i+1}`,
                                language: track.language,
                                enabled: track.enabled
                            });
                        }
                    }
                    
                    // 如果无法获取，尝试从文件名推断
                    if (tracks.length === 0) {
                        const name = file.name.toLowerCase();
                        if (name.includes('dual') || name.includes('双语') || name.includes('国粤')) {
                            tracks.push(
                                { id: 0, label: '国语', language: 'zh' },
                                { id: 1, label: '粤语', language: 'yue' }
                            );
                        } else if (name.includes('国语') || name.includes('普通话')) {
                            tracks.push({ id: 0, label: '国语', language: 'zh' });
                        } else if (name.includes('粤语') || name.includes('广东话')) {
                            tracks.push({ id: 0, label: '粤语', language: 'yue' });
                        } else {
                            tracks.push({ id: 0, label: '默认', language: '' });
                        }
                    }
                    
                    URL.revokeObjectURL(url);
                    resolve(tracks);
                };
                
                video.onerror = () => {
                    URL.revokeObjectURL(url);
                    resolve([{ id: 0, label: '默认', language: '' }]);
                };
                
                // 超时处理
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                    resolve([{ id: 0, label: '默认', language: '' }]);
                }, 5000);
            });
        }

        // 显示电影
        function displayMovies(movies = allMovies) {
            const grid = document.getElementById('movie-grid');
            
            if (movies.length === 0) {
                grid.innerHTML = '<div class="loading">没有找到影片</div>';
                return;
            }

            grid.innerHTML = movies.map((movie, index) => {
                const audioBadge = movie.hasMultipleAudio 
                    ? `<div class="movie-audio">🎧 ${movie.audioTracks.length}音轨</div>` 
                    : '';
                
                return `
                <div class="movie-card" onclick="playMovie(${index})">
                    <div class="movie-poster">🎬</div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.name}</div>
                        <div class="movie-year">${movie.year || '未知'}</div>
                        <div class="movie-size">${movie.is4K ? '4K' : movie.isHD ? 'HD' : 'SD'} • ${movie.size} GB</div>
                        ${audioBadge}
                    </div>
                </div>
            `}).join('');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('total-movies').textContent = allMovies.length;
            
            const totalSize = allMovies.reduce((sum, m) => sum + parseFloat(m.size), 0);
            document.getElementById('total-size').textContent = totalSize.toFixed(1) + ' GB';
            
            document.getElementById('hd-movies').textContent = allMovies.filter(m => m.isHD && !m.is4K).length;
            document.getElementById('4k-movies').textContent = allMovies.filter(m => m.is4K).length;
        }

        // 提取年份
        function extractYear(filename) {
            const match = filename.match(/\b(19|20)\d{2}\b/);
            return match ? match[0] : null;
        }

        // 搜索
        function searchMovies() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allMovies.filter(m => m.name.toLowerCase().includes(query));
            displayMovies(filtered);
        }

        // 筛选
        function filterMovies(type) {
            currentFilter = type;
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            let filtered = allMovies;
            
            if (type === '4k') filtered = allMovies.filter(m => m.is4K);
            else if (type === 'hd') filtered = allMovies.filter(m => m.isHD && !m.is4K);
            else if (type === 'multi-audio') filtered = allMovies.filter(m => m.hasMultipleAudio === true);
            else if (type === 'recent') filtered = allMovies.slice(-20);

            displayMovies(filtered);
        }

        // 播放电影
        async function playMovie(index) {
            currentMovieIndex = index;
            const movie = allMovies[index];
            const overlay = document.getElementById('player-overlay');
            const video = document.getElementById('video-player');
            const title = document.getElementById('playing-title');
            const audioControls = document.getElementById('audio-controls');
            const audioButtons = document.getElementById('audio-buttons');
            const audioInfo = document.getElementById('audio-info');

            // 创建视频 URL
            const url = URL.createObjectURL(movie.file);
            video.src = url;
            title.textContent = movie.name;
            overlay.style.display = 'flex';
            
            // 加载音轨信息
            if (!movie.audioTracks || movie.audioTracks.length === 0) {
                const tracks = await getAudioTracks(movie.file);
                movie.audioTracks = tracks;
                movie.hasMultipleAudio = tracks.length > 1;
            }

            // 显示音轨控制
            if (movie.hasMultipleAudio && movie.audioTracks.length > 1) {
                audioControls.style.display = 'block';
                audioButtons.innerHTML = movie.audioTracks.map((track, i) => `
                    <button class="audio-btn ${i === 0 ? 'active' : ''}" 
                            onclick="switchAudioTrack(${i})">
                        🎧 ${track.label}
                    </button>
                `).join('');
                audioInfo.textContent = `当前影片有 ${movie.audioTracks.length} 个音轨，点击按钮切换`;
            } else {
                audioControls.style.display = 'none';
            }

            video.play();
            showTooltip('按 ESC 关闭播放器 • 多音轨影片可切换国语/粤语');
        }

        // 切换音轨
        function switchAudioTrack(trackIndex) {
            const video = document.getElementById('video-player');
            const movie = allMovies[currentMovieIndex];
            
            if (video.audioTracks && video.audioTracks.length > 0) {
                // 浏览器支持 audioTracks API
                for (let i = 0; i < video.audioTracks.length; i++) {
                    video.audioTracks[i].enabled = (i === trackIndex);
                }
                showTooltip(`已切换到：${movie.audioTracks[trackIndex].label}`);
            } else {
                // 浏览器不支持，提示用 VLC
                showTooltip('⚠️ 此浏览器不支持音轨切换，建议使用 VLC 播放器');
            }

            // 更新按钮状态
            document.querySelectorAll('.audio-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === trackIndex);
            });
        }

        // 关闭播放器
        function closePlayer() {
            const overlay = document.getElementById('player-overlay');
            const video = document.getElementById('video-player');
            video.pause();
            video.src = '';
            overlay.style.display = 'none';
            currentMovieIndex = -1;
        }

        // 显示提示
        function showTooltip(message) {
            const tooltip = document.getElementById('tooltip');
            tooltip.textContent = message;
            tooltip.style.display = 'block';
            setTimeout(() => {
                tooltip.style.display = 'none';
            }, 4000);
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePlayer();
        });
    </script>
</body>
</html>
