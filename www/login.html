<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>🔐 登录 - 健康管家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --secondary: #FF9800;
            --danger: #f44336;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #666;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .back-btn:hover {
            color: var(--primary);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo .icon {
            font-size: 4em;
            display: block;
            margin-bottom: 10px;
        }
        .logo h1 {
            color: var(--primary);
            font-size: 1.8em;
        }
        .logo p {
            color: #666;
            margin-top: 5px;
        }
        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .role-btn {
            flex: 1;
            padding: 15px;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            background: #f8f9fa;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }
        .role-btn .icon {
            font-size: 2em;
            display: block;
            margin-bottom: 5px;
        }
        .role-btn .label {
            font-weight: bold;
            color: var(--text);
        }
        .role-btn.active {
            border-color: var(--primary);
            background: #e8f5e9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76,175,80,0.2);
        }
        .role-btn.active .label {
            color: var(--primary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text);
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-group small {
            display: block;
            margin-top: 5px;
            color: #666;
            font-size: 0.85em;
        }
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #9e9e9e, #757575);
        }
        .divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
            position: relative;
        }
        .divider:before,
        .divider:after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }
        .divider:before { left: 0; }
        .divider:after { right: 0; }
        .forgot-password {
            text-align: right;
            margin-top: 10px;
        }
        .forgot-password a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9em;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #ffebee;
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .error-message.show {
            display: block;
        }
        .demo-accounts {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #2196F3;
        }
        .demo-accounts h4 {
            color: #1976D2;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        .demo-accounts p {
            color: #555;
            font-size: 0.85em;
            margin: 5px 0;
        }
        .demo-accounts code {
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="splash.html" class="back-btn">
            <span>←</span>
            <span>返回</span>
        </a>

        <div class="logo">
            <span class="icon">🔐</span>
            <h1>欢迎回来</h1>
            <p>请选择您的身份登录</p>
        </div>

        <!-- 身份选择 -->
        <div class="role-selector">
            <div class="role-btn active" id="studentRoleBtn" onclick="selectRole('student')">
                <span class="icon">👤</span>
                <span class="label">学员</span>
            </div>
            <div class="role-btn" id="coachRoleBtn" onclick="selectRole('coach')">
                <span class="icon">👨‍🏫</span>
                <span class="label">教练</span>
            </div>
        </div>

        <!-- 错误消息 -->
        <div id="errorMessage" class="error-message"></div>

        <!-- 登录表单 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">电子邮箱</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码">
                <div class="forgot-password">
                    <a href="#" onclick="alert('请联系管理员重置密码')">忘记密码？</a>
                </div>
            </div>

            <button type="submit" class="btn" id="loginBtn">
                <span>👤</span>
                <span>学员登录</span>
            </button>
        </form>

        <div class="divider">或</div>

        <button class="btn btn-secondary" onclick="goToRegister()">
            注册新账号
        </button>

        <!-- 测试账号提示 -->
        <div class="demo-accounts">
            <h4>🧪 测试账号</h4>
            <p>学员：<code>student@test.com</code> / <code>123456</code></p>
            <p>教练：<code>coach@test.com</code> / <code>123456</code></p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    
    <script>
        let currentRole = 'student';

        function selectRole(role) {
            currentRole = role;
            
            const studentBtn = document.getElementById('studentRoleBtn');
            const coachBtn = document.getElementById('coachRoleBtn');
            const loginBtn = document.getElementById('loginBtn');
            
            if (role === 'student') {
                studentBtn.classList.add('active');
                coachBtn.classList.remove('active');
                loginBtn.innerHTML = '<span>👤</span><span>学员登录</span>';
            } else {
                coachBtn.classList.add('active');
                studentBtn.classList.remove('active');
                loginBtn.innerHTML = '<span>👨‍🏫</span><span>教练登录</span>';
            }
            
            console.log('👉 选择角色:', role);
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            console.log('🔐 尝试登录:', { email, role: currentRole });
            
            // 使用 Firebase 登录
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    const user = userCredential.user;
                    console.log('✅ Firebase 登录成功:', user.email);
                    
                    // 获取用户额外数据
                    const userData = {
                        id: user.uid,
                        name: user.displayName || email.split('@')[0],
                        email: user.email,
                        role: currentRole,
                        avatar: currentRole === 'coach' ? '👨‍🏫' : '👤'
                    };
                    
                    // 保存到本地存储
                    localStorage.setItem('healthApp_user', JSON.stringify(userData));
                    
                    // 跳转
                    if (currentRole === 'coach') {
                        window.location.href = 'coach_dashboard.html';
                    } else {
                        window.location.href = 'app.html';
                    }
                })
                .catch(function(error) {
                    console.error('❌ Firebase 登录失败:', error);
                    
                    // Firebase 登录失败，尝试本地登录（兼容模式）
                    const users = JSON.parse(localStorage.getItem('healthApp_users') || '[]');
                    const localUser = users.find(u => u.email === email && u.password === password && u.role === currentRole);
                    
                    if (localUser) {
                        if (currentRole === 'coach' && localUser.status !== 'approved') {
                            errorDiv.textContent = '⚠️ 您的教练申请还在审核中，请耐心等待';
                            errorDiv.classList.add('show');
                            return;
                        }
                        
                        const userData = {
                            id: localUser.id,
                            name: localUser.name,
                            email: localUser.email,
                            role: localUser.role,
                            avatar: localUser.avatar || (localUser.role === 'coach' ? '👨‍🏫' : '👤')
                        };
                        
                        localStorage.setItem('healthApp_user', JSON.stringify(userData));
                        
                        if (currentRole === 'coach') {
                            window.location.href = 'coach_dashboard.html';
                        } else {
                            window.location.href = 'app.html';
                        }
                    } else {
                        errorDiv.textContent = '❌ 邮箱或密码错误';
                        errorDiv.classList.add('show');
                    }
                });
        }

        function goToRegister() {
            window.location.href = 'register_choice.html';
        }
    </script>
</body>
</html>
