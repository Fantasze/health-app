<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>🔐 登录 - 健康管家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --danger: #f44336;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo .icon {
            font-size: 4em;
            display: block;
            margin-bottom: 10px;
        }
        .logo h1 {
            color: var(--primary);
            font-size: 1.8em;
        }
        .logo p {
            color: #666;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text);
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #9e9e9e, #757575);
        }
        .divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
        }
        .role-selector {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        .role-btn {
            flex: 1;
            padding: 20px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .role-btn.active {
            border-color: var(--primary);
            background: #e8f5e9;
        }
        .role-btn .icon {
            font-size: 2em;
            display: block;
            margin-bottom: 10px;
        }
        .role-btn .label {
            font-size: 1.1em;
            font-weight: bold;
        }
        .links {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .links a {
            color: var(--primary);
            text-decoration: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .error { color: var(--danger); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="icon">💪</span>
            <h1>健康管家</h1>
            <p>欢迎回来</p>
        </div>

        <!-- 角色选择 -->
        <div class="role-selector">
            <div class="role-btn active" onclick="selectRole('student')" id="role-student">
                <span class="icon">👤</span>
                <span class="label">学员</span>
            </div>
            <div class="role-btn" onclick="selectRole('coach')" id="role-coach">
                <span class="icon">👨‍🏫</span>
                <span class="label">教练</span>
            </div>
        </div>

        <!-- 学员登录表单 -->
        <form id="student-login-form">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="student-email" required placeholder="你的邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="student-password" required placeholder="你的密码">
            </div>
            <button type="submit" class="btn">🔐 登录</button>
            <div class="links">
                还没有账号？<a href="student_register.html">立即注册</a>
            </div>
        </form>

        <!-- 教练登录表单 -->
        <form id="coach-login-form" style="display:none;">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="coach-email" required placeholder="教练邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="coach-password" required placeholder="教练密码">
            </div>
            <button type="submit" class="btn">🔐 教练登录</button>
            <div class="links">
                想成为教练？<a href="#" onclick="alert('请联系管理员申请教练账号'); return false;">申请教练认证</a>
            </div>
        </form>

        <div class="divider">或</div>

        <button class="btn btn-secondary" onclick="window.location.href='index.html'">
            👋 先随便看看
        </button>
    </div>

    <!-- 错误弹窗 -->
    <div id="error-modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon error">❌</div>
            <h2 style="margin-bottom:15px;">登录失败</h2>
            <p id="error-message" style="color:#666; margin-bottom:20px;"></p>
            <button class="btn" onclick="closeErrorModal()">重试</button>
        </div>
    </div>

    <script>
        let currentRole = 'student';

        // 选择角色
        function selectRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('role-' + role).classList.add('active');

            if (role === 'student') {
                document.getElementById('student-login-form').style.display = 'block';
                document.getElementById('coach-login-form').style.display = 'none';
            } else {
                document.getElementById('student-login-form').style.display = 'none';
                document.getElementById('coach-login-form').style.display = 'block';
            }
        }

        // 学员登录
        document.getElementById('student-login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('student-email').value.trim();
            const password = document.getElementById('student-password').value;

            const students = JSON.parse(localStorage.getItem('admin_students') || '[]');
            const student = students.find(s => s.email === email && s.password === password);

            if (student) {
                localStorage.setItem('healthApp_currentUser', JSON.stringify(student));
                window.location.href = 'index.html';
            } else {
                showError('邮箱或密码错误');
            }
        });

        // 教练登录
        document.getElementById('coach-login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('coach-email').value.trim();
            const password = document.getElementById('coach-password').value;

            const coaches = JSON.parse(localStorage.getItem('admin_coaches') || '[]');
            const coach = coaches.find(c => c.email === email && c.password === password);

            if (coach) {
                if (coach.status === 'pending') {
                    showError('你的教练账号还在审核中，请耐心等待');
                    return;
                }
                if (coach.status === 'rejected') {
                    showError('你的教练申请已被拒绝：' + (coach.rejectionReason || '原因未知'));
                    return;
                }

                localStorage.setItem('healthApp_currentCoach', JSON.stringify(coach));
                window.location.href = 'coach.html';
            } else {
                showError('邮箱或密码错误');
            }
        });

        // 显示错误
        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-modal').classList.add('active');
        }

        // 关闭错误弹窗
        function closeErrorModal() {
            document.getElementById('error-modal').classList.remove('active');
        }
    </script>
</body>
</html>
