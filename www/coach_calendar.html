<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康管家 - 教练日历</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;min-height:100vh;padding-bottom:70px}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:25px 20px 20px}
        .header h1{font-size:22px}
        .content{padding:20px}
        .card{background:white;border-radius:15px;padding:20px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
        .card h3{color:#333;font-size:17px;margin-bottom:15px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;color:#555;margin-bottom:8px;font-size:14px;font-weight:500}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px}
        .form-group input:focus,.form-group select:focus{border-color:#667eea;outline:none}
        .btn{width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;border:none;margin-bottom:10px}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed}
        .session-item{background:#f8f9fa;border-radius:12px;padding:15px;margin-bottom:15px}
        .session-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .session-date{font-size:13px;color:#667eea;font-weight:600}
        .session-time{font-size:12px;color:#999}
        .session-student{font-size:14px;font-weight:600;color:#333;margin-bottom:5px}
        .session-type{font-size:13px;color:#666}
        .session-actions{display:flex;gap:10px;margin-top:10px}
        .session-actions .btn{flex:1;padding:10px;font-size:13px}
        .nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -5px 20px rgba(0,0,0,0.1);z-index:100}
        .nav-item{text-align:center;color:#999;font-size:11px;cursor:pointer;text-decoration:none}
        .nav-item.active{color:#667eea}
        .nav-icon{font-size:22px;display:block;margin-bottom:2px}
        .empty-state{text-align:center;padding:30px;color:#999}
        .empty-icon{font-size:48px;margin-bottom:10px}
        .loading{text-align:center;padding:20px;color:#666}
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 教练日历</h1>
    </div>
    
    <div class="content">
        <div class="card">
            <h3>➕ 添加训练课程</h3>
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="sessionDate">
            </div>
            <div class="form-group">
                <label>时间</label>
                <input type="time" id="sessionTime">
            </div>
            <div class="form-group">
                <label>训练类型</label>
                <select id="sessionType">
                    <option value="私人训练">私人训练</option>
                    <option value="营养咨询">营养咨询</option>
                    <option value="团体课">团体课</option>
                    <option value="线上指导">线上指导</option>
                </select>
            </div>
            <div class="form-group">
                <label>选择学生</label>
                <select id="sessionStudent">
                    <option value="">-- 选择学生 --</option>
                </select>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="sessionNotes" rows="3" placeholder="训练内容、注意事项等..."></textarea>
            </div>
            <button class="btn btn-primary" id="addBtn" onclick="addSession()">📅 添加课程</button>
        </div>
        
        <div class="card">
            <h3>📋 upcoming 课程</h3>
            <div id="sessionList">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item" onclick="window.location.href='coach_dashboard.html'"><span class="nav-icon">📊</span>后台</div>
        <div class="nav-item active"><span class="nav-icon">📅</span>日历</div>
        <div class="nav-item" onclick="window.location.href='coach_profile.html'"><span class="nav-icon">👤</span>我的</div>
    </div>
    
    <script>
        let coachSession=null;
        const db=window.firebaseApp.db;
        
        function checkLogin(){
            coachSession=JSON.parse(localStorage.getItem('coachSession'));
            if(!coachSession){
                window.location.href='coach_direct_login.html';
            }
        }
        
        async function loadStudents(){
            try{
                const studentsSnapshot=await db.collection('students')
                    .where('coachId','==',coachSession.id)
                    .get();
                
                const students=studentsSnapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
                const select=document.getElementById('sessionStudent');
                
                if(students.length===0){
                    select.innerHTML='<option value="">-- 暂无学生 --</option>';
                    return;
                }
                
                select.innerHTML=students.map(s=>`<option value="${s.id}">${s.name} (${s.phone})</option>`).join('');
            }catch(error){
                console.error('加载学生失败:',error);
            }
        }
        
        async function addSession(){
            const date=document.getElementById('sessionDate').value;
            const time=document.getElementById('sessionTime').value;
            const type=document.getElementById('sessionType').value;
            const studentId=document.getElementById('sessionStudent').value;
            const notes=document.getElementById('sessionNotes').value;
            
            if(!date||!time||!studentId){
                alert('请填写日期、时间和选择学生');
                return;
            }
            
            const addBtn=document.getElementById('addBtn');
            addBtn.disabled=true;
            addBtn.textContent='添加中...';
            
            try{
                // 获取学生信息
                const studentDoc=await db.collection('students').doc(studentId).get();
                const student=studentDoc.data();
                
                // 创建课程
                const sessionData={
                    coachId:coachSession.id,
                    coachName:coachSession.name,
                    studentId:studentId,
                    studentName:student.name,
                    date,
                    time,
                    type,
                    notes,
                    status:'scheduled',
                    canChange:true,
                    changeDeadline:new Date(date+'T'+time).getTime()-(24*60*60*1000),
                    createdAt:firebase.firestore.FieldValue.serverTimestamp()
                };
                
                const sessionRef=await db.collection('sessions').add(sessionData);
                
                alert('✅ 课程已添加！\n学生日历已同步。');
                
                // 清空表单
                document.getElementById('sessionDate').value='';
                document.getElementById('sessionTime').value='';
                document.getElementById('sessionNotes').value='';
                
                loadSessions();
            }catch(error){
                console.error('添加课程失败:',error);
                alert('❌ 添加失败：'+error.message);
            }finally{
                addBtn.disabled=false;
                addBtn.textContent='📅 添加课程';
            }
        }
        
        async function loadSessions(){
            try{
                const now=Date.now();
                const sessionsSnapshot=await db.collection('sessions')
                    .where('coachId','==',coachSession.id)
                    .orderBy('date','asc')
                    .orderBy('time','asc')
                    .get();
                
                const sessions=sessionsSnapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
                const futureSessions=sessions.filter(s=>{
                    const sessionTime=new Date(s.date+'T'+s.time).getTime();
                    return sessionTime>=now;
                });
                
                const sessionList=document.getElementById('sessionList');
                
                if(futureSessions.length===0){
                    sessionList.innerHTML='<div class="empty-state"><div class="empty-icon">📅</div><div>暂无 upcoming 课程</div></div>';
                    return;
                }
                
                sessionList.innerHTML=futureSessions.map(session=>{
                    const sessionTime=new Date(session.date+'T'+session.time).getTime();
                    const canChange=sessionTime-now>(24*60*60*1000);
                    
                    return `
                    <div class="session-item">
                        <div class="session-header">
                            <div class="session-date">${new Date(session.date).toLocaleDateString()}</div>
                            <div class="session-time">⏰ ${session.time}</div>
                        </div>
                        <div class="session-student">👤 ${session.studentName}</div>
                        <div class="session-type">${session.type}</div>
                        ${session.notes?`<div style="font-size:12px;color:#999;margin-top:5px">📝 ${session.notes}</div>`:''}
                        <div class="session-actions">
                            ${canChange?`<button class="btn btn-secondary" onclick="changeSession('${session.id}','${session.date}','${session.time}')">🔄 更改时间</button>`:''}
                            <button class="btn btn-secondary" onclick="cancelSession('${session.id}')">❌ 取消</button>
                        </div>
                    </div>
                    `;
                }).join('');
            }catch(error){
                console.error('加载课程失败:',error);
                document.getElementById('sessionList').innerHTML='<div class="empty-state">加载失败</div>';
            }
        }
        
        async function changeSession(sessionId,date,time){
            const newDate=prompt('新日期 (YYYY-MM-DD):',date);
            const newTime=prompt('新时间 (HH:MM):',time);
            
            if(newDate&&newTime){
                try{
                    await db.collection('sessions').doc(sessionId).update({
                        date:newDate,
                        time:newTime,
                        changeDeadline:new Date(newDate+'T'+newTime).getTime()-(24*60*60*1000)
                    });
                    
                    alert('✅ 课程时间已更改！');
                    loadSessions();
                }catch(error){
                    console.error('更改课程失败:',error);
                    alert('❌ 更改失败：'+error.message);
                }
            }
        }
        
        async function cancelSession(sessionId){
            if(!confirm('确定要取消这个课程吗？'))return;
            
            try{
                await db.collection('sessions').doc(sessionId).delete();
                alert('❌ 课程已取消');
                loadSessions();
            }catch(error){
                console.error('取消课程失败:',error);
                alert('❌ 取消失败：'+error.message);
            }
        }
        
        // 设置最小日期为今天
        document.getElementById('sessionDate').min=new Date().toISOString().split('T')[0];
        
        checkLogin();
        loadStudents();
        loadSessions();
    </script>
</body>
</html>
