<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成 App 图标 - 健康管家</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            padding: 40px;
            text-align: center;
        }
        .icon-container {
            display: inline-block;
            margin: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        canvas {
            border-radius: 20px;
        }
        .download-btn {
            background: #4CAF50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            margin: 10px;
        }
        .download-btn:hover {
            background: #388E3C;
        }
        h2 { color: #4CAF50; }
        .info {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 600px;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>🎨 健康管家 App 图标生成器</h1>
    
    <div class="info">
        <h3>📐 生成的图标尺寸：</h3>
        <ul>
            <li><strong>1024x1024</strong> - App Store / Google Play 主图标</li>
            <li><strong>512x512</strong> - Google Play 必需</li>
            <li><strong>192x192</strong> - Android 主屏幕</li>
            <li><strong>144x144</strong> - Android 高分辨率</li>
            <li><strong>96x96</strong> - Android 标准</li>
            <li><strong>72x72</strong> - Android 旧版</li>
            <li><strong>48x48</strong> - Android 小图标</li>
        </ul>
    </div>

    <div class="icon-container">
        <h2>💪 方案 1：肌肉手臂</h2>
        <canvas id="icon1" width="1024" height="1024"></canvas>
        <br>
        <button class="download-btn" onclick="downloadIcon('icon1', 'icon-1024.png')">下载 1024x1024</button>
        <button class="download-btn" onclick="downloadAllSizes('icon1', 'muscle')">下载所有尺寸</button>
    </div>

    <div class="icon-container">
        <h2>🥗 方案 2：健康沙拉</h2>
        <canvas id="icon2" width="1024" height="1024"></canvas>
        <br>
        <button class="download-btn" onclick="downloadIcon('icon2', 'icon-salad-1024.png')">下载 1024x1024</button>
        <button class="download-btn" onclick="downloadAllSizes('icon2', 'salad')">下载所有尺寸</button>
    </div>

    <div class="icon-container">
        <h2>❤️ 方案 3：健康心脏</h2>
        <canvas id="icon3" width="1024" height="1024"></canvas>
        <br>
        <button class="download-btn" onclick="downloadIcon('icon3', 'icon-heart-1024.png')">下载 1024x1024</button>
        <button class="download-btn" onclick="downloadAllSizes('icon3', 'heart')">下载所有尺寸</button>
    </div>

    <div class="icon-container">
        <h2>🏃 方案 4：跑步小人</h2>
        <canvas id="icon4" width="1024" height="1024"></canvas>
        <br>
        <button class="download-btn" onclick="downloadIcon('icon4', 'icon-run-1024.png')">下载 1024x1024</button>
        <button class="download-btn" onclick="downloadAllSizes('icon4', 'run')">下载所有尺寸</button>
    </div>

    <script>
        // 绘制图标函数
        function drawIcon(canvasId, emoji, gradientColors) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            // 背景渐变
            const gradient = ctx.createLinearGradient(0, 0, 1024, 1024);
            gradient.addColorStop(0, gradientColors[0]);
            gradient.addColorStop(1, gradientColors[1]);
            
            // 圆角矩形背景
            ctx.fillStyle = gradient;
            roundRect(ctx, 0, 0, 1024, 1024, 200);
            ctx.fill();
            
            // 添加阴影
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 50;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 20;
            
            // 绘制 emoji
            ctx.font = '500px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'white';
            ctx.fillText(emoji, 512, 512);
            
            // 重置阴影
            ctx.shadowColor = 'transparent';
        }

        // 圆角矩形函数
        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // 下载单个图标
        function downloadIcon(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 下载所有尺寸
        function downloadAllSizes(canvasId, prefix) {
            const canvas = document.getElementById(canvasId);
            const sizes = [1024, 512, 192, 144, 96, 72, 48];
            
            sizes.forEach(size => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = size;
                tempCanvas.height = size;
                const ctx = tempCanvas.getContext('2d');
                ctx.drawImage(canvas, 0, 0, size, size);
                
                const link = document.createElement('a');
                link.download = `${prefix}-${size}x${size}.png`;
                link.href = tempCanvas.toDataURL('image/png');
                link.click();
            });
            
            alert('已下载所有尺寸的图标！');
        }

        // 初始化绘制所有图标
        drawIcon('icon1', '💪', ['#4CAF50', '#388E3C']);
        drawIcon('icon2', '🥗', ['#8BC34A', '#689F38']);
        drawIcon('icon3', '❤️', ['#f44336', '#c62828']);
        drawIcon('icon4', '🏃', ['#FF9800', '#F57C00']);
    </script>
</body>
</html>
