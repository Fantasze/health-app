<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教练后台 - 健康管家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 30px 20px 80px;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }
        .nav-item {
            text-align: center;
            color: #999;
            font-size: 12px;
            cursor: pointer;
        }
        .nav-item.active { color: #11998e; }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 3px; }
        .content {
            padding: 20px;
            margin-top: -60px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .card h3 { color: #333; margin-bottom: 10px; font-size: 18px; }
        .card p { color: #666; font-size: 14px; line-height: 1.6; }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-item {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .stat-value { font-size: 28px; font-weight: 700; color: #11998e; }
        .stat-label { font-size: 12px; color: #999; margin-top: 5px; }
        .btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .student-list {
            margin-top: 15px;
        }
        .student-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .student-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-right: 15px;
        }
        .student-info { flex: 1; }
        .student-name { font-weight: 600; color: #333; }
        .student-plan { font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>👨‍🏫 教练后台</h1>
        <p>管理你的学员和课程</p>
    </div>
    
    <div class="content">
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="students">0</div>
                <div class="stat-label">学员数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="income">¥0</div>
                <div class="stat-label">本月收入</div>
            </div>
        </div>
        
        <div class="card">
            <h3>📅 今日课程</h3>
            <p>今天下午 3:00 - 张三（减脂计划）</p>
            <button class="btn" onclick="alert('课程管理功能开发中')">查看课表</button>
        </div>
        
        <div class="card">
            <h3>👥 我的学员</h3>
            <div class="student-list">
                <div class="student-item">
                    <div class="student-avatar">李</div>
                    <div class="student-info">
                        <div class="student-name">李四</div>
                        <div class="student-plan">增肌计划 · 第 15 天</div>
                    </div>
                </div>
                <div class="student-item">
                    <div class="student-avatar">王</div>
                    <div class="student-info">
                        <div class="student-name">王五</div>
                        <div class="student-plan">减脂计划 · 第 8 天</div>
                    </div>
                </div>
            </div>
            <button class="btn" onclick="alert('学员管理功能开发中')">管理学员</button>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item active">
            <span class="nav-icon">📊</span>
            后台
        </div>
        <div class="nav-item">
            <span class="nav-icon">📅</span>
            课程
        </div>
        <div class="nav-item">
            <span class="nav-icon">👤</span>
            我的
        </div>
    </div>
    
    <script>
        document.getElementById('students').textContent = localStorage.getItem('coachStudents') || 2;
        document.getElementById('income').textContent = '¥' + (localStorage.getItem('coachIncome') || 8500);
    </script>
</body>
</html>
