<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康管家 - 教练后台</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;min-height:100vh;padding-bottom:70px}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:25px 20px 20px}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .header h1{font-size:22px}
        .logout-btn{color:white;text-decoration:none;font-size:14px;padding:8px 15px;border:1px solid rgba(255,255,255,0.5);border-radius:20px}
        .content{padding:20px}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-bottom:20px}
        .stat-card{background:white;border-radius:15px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
        .stat-icon{font-size:32px;margin-bottom:10px}
        .stat-value{font-size:28px;font-weight:700;color:#667eea}
        .stat-label{font-size:12px;color:#999;margin-top:5px}
        .card{background:white;border-radius:15px;padding:20px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .card h3{color:#333;font-size:17px}
        .btn{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .student-item{background:#f8f9fa;border-radius:12px;padding:15px;margin-bottom:15px}
        .student-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .student-name{font-size:15px;font-weight:600;color:#333}
        .student-booked{font-size:12px;color:#667eea}
        .student-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
        .stat-item{text-align:center;padding:10px;background:white;border-radius:8px}
        .stat-item-label{font-size:11px;color:#999}
        .stat-item-value{font-size:14px;font-weight:600;color:#333;margin-top:3px}
        .weight-progress{background:#e0e0e0;height:8px;border-radius:4px;overflow:hidden;margin-top:10px}
        .weight-bar{background:#4ade80;height:100%;border-radius:4px;transition:width 0.5s}
        .remaining-classes{background:#fef3c7;color:#d97706;padding:8px 12px;border-radius:8px;text-align:center;font-size:13px;font-weight:600;margin-top:10px}
        .nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -5px 20px rgba(0,0,0,0.1);z-index:100}
        .nav-item{text-align:center;color:#999;font-size:11px;cursor:pointer;text-decoration:none}
        .nav-item.active{color:#667eea}
        .nav-icon{font-size:22px;display:block;margin-bottom:2px}
        .empty-state{text-align:center;padding:30px;color:#999}
        .empty-icon{font-size:48px;margin-bottom:10px}
        .schedule-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
        .schedule-item:last-child{border-bottom:none}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <h1>👨‍🏫 教练后台</h1>
            <a href="index.html" class="logout-btn" onclick="logout()">登出</a>
        </div>
    </div>
    
    <div class="content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="studentCount">0</div>
                <div class="stat-label">活跃学生</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="monthlyIncome">RM 0</div>
                <div class="stat-label">本月收入</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" id="todaySessions">0</div>
                <div class="stat-label">今日课程</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="coachRating">4.9</div>
                <div class="stat-label">评分</div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h3>👥 我的学生</h3>
            </div>
            <div id="studentList">
                <div class="empty-state">
                    <div class="empty-icon">👥</div>
                    <div>暂无学生</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h3>📅 今日课程</h3>
            </div>
            <div id="scheduleList">
                <div class="empty-state">
                    <div class="empty-icon">📅</div>
                    <div>暂无课程</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item active"><span class="nav-icon">📊</span>后台</div>
        <div class="nav-item" onclick="window.location.href='coach_calendar.html'"><span class="nav-icon">📅</span>日历</div>
        <div class="nav-item" onclick="window.location.href='coach_profile.html'"><span class="nav-icon">👤</span>我的</div>
    </div>
    
    <script>
        let coachSession=null;
        const db=window.firebaseApp.db;
        
        function checkLogin(){
            coachSession=JSON.parse(localStorage.getItem('coachSession'));
            if(!coachSession){
                window.location.href='coach_direct_login.html';
            }
        }
        
        function logout(){
            localStorage.removeItem('coachSession');
            window.location.href='index.html';
        }
        
        async function loadStudents(){
            try{
                // 通过教练名字查询学生
                const studentsSnapshot=await db.collection('students')
                    .where('coachName','==',coachSession.name)
                    .where('status','==','active')
                    .get();
                
                const students=studentsSnapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
                document.getElementById('studentCount').textContent=students.length;
                
                const studentList=document.getElementById('studentList');
                if(students.length===0){
                    studentList.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div><div>暂无学生</div></div>';
                    return;
                }
                
                studentList.innerHTML=students.map(student=>{
                    const weightProgress=((student.currentWeight-student.startWeight)/(student.targetWeight-student.startWeight))*100;
                    const remainingClasses=student.totalClasses-student.usedClasses;
                    
                    return `
                    <div class="student-item">
                        <div class="student-header">
                            <div class="student-name">${student.name}</div>
                            <div class="student-booked">📅 Booked: ${new Date(student.bookDate).toLocaleDateString()}</div>
                        </div>
                        <div class="student-stats">
                            <div class="stat-item">
                                <div class="stat-item-label">初始体重</div>
                                <div class="stat-item-value">${student.startWeight} kg</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-item-label">当前体重</div>
                                <div class="stat-item-value">${student.currentWeight} kg</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-item-label">目标体重</div>
                                <div class="stat-item-value">${student.targetWeight} kg</div>
                            </div>
                        </div>
                        <div style="font-size:12px;color:#666;margin-bottom:5px">体重进度</div>
                        <div class="weight-progress">
                            <div class="weight-bar" style="width:${Math.min(100,Math.max(0,weightProgress))}%"></div>
                        </div>
                        <div class="remaining-classes">
                            📚 剩余 ${remainingClasses} / ${student.totalClasses} 堂课
                        </div>
                    </div>
                    `;
                }).join('');
            }catch(error){
                console.error('加载学生失败:',error);
            }
        }
        
        async function loadSchedule(){
            try{
                const today=new Date().toISOString().split('T')[0];
                const sessionsSnapshot=await db.collection('sessions')
                    .where('coachId','==',coachSession.id)
                    .where('date','==',today)
                    .get();
                
                const todaySessions=sessionsSnapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
                document.getElementById('todaySessions').textContent=todaySessions.length;
                
                const scheduleList=document.getElementById('scheduleList');
                if(todaySessions.length===0){
                    scheduleList.innerHTML='<div class="empty-state"><div class="empty-icon">📅</div><div>暂无课程</div></div>';
                    return;
                }
                
                scheduleList.innerHTML=todaySessions.map(session=>`
                    <div class="schedule-item">
                        <div style="width:80px;font-size:13px;color:#666">${session.time}</div>
                        <div style="flex:1">
                            <div style="color:#333;font-size:14px;font-weight:600">${session.type}</div>
                            <div style="font-size:12px;color:#999">${session.studentName}</div>
                        </div>
                    </div>
                `).join('');
            }catch(error){
                console.error('加载课程失败:',error);
            }
        }
        
        checkLogin();
        loadStudents();
        loadSchedule();
    </script>
</body>
</html>
