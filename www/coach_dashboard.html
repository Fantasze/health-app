<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康管家 - 教练后台</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;min-height:100vh;padding-bottom:70px}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:25px 20px 20px}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .header h1{font-size:22px}
        .logout-btn{color:white;text-decoration:none;font-size:14px;padding:8px 15px;border:1px solid rgba(255,255,255,0.5);border-radius:20px}
        .content{padding:20px}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-bottom:20px}
        .stat-card{background:white;border-radius:15px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
        .stat-icon{font-size:32px;margin-bottom:10px}
        .stat-value{font-size:28px;font-weight:700;color:#667eea}
        .stat-label{font-size:12px;color:#999;margin-top:5px}
        .card{background:white;border-radius:15px;padding:20px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .card h3{color:#333;font-size:17px}
        .btn{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
        .btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .student-item{background:#f8f9fa;border-radius:12px;padding:15px;margin-bottom:15px}
        .student-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .student-name{font-size:15px;font-weight:600;color:#333}
        .student-booked{font-size:12px;color:#667eea}
        .student-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
        .stat-item{text-align:center;padding:10px;background:white;border-radius:8px}
        .stat-item-label{font-size:11px;color:#999}
        .stat-item-value{font-size:14px;font-weight:600;color:#333;margin-top:3px}
        .weight-progress{background:#e0e0e0;height:8px;border-radius:4px;overflow:hidden;margin-top:10px}
        .weight-bar{background:#4ade80;height:100%;border-radius:4px;transition:width 0.5s}
        .remaining-classes{background:#fef3c7;color:#d97706;padding:8px 12px;border-radius:8px;text-align:center;font-size:13px;font-weight:600;margin-top:10px}
        .nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -5px 20px rgba(0,0,0,0.1);z-index:100}
        .nav-item{text-align:center;color:#999;font-size:11px;cursor:pointer;text-decoration:none}
        .nav-item.active{color:#667eea}
        .nav-icon{font-size:22px;display:block;margin-bottom:2px}
        .empty-state{text-align:center;padding:30px;color:#999}
        .empty-icon{font-size:48px;margin-bottom:10px}
        .schedule-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0}
        .schedule-item:last-child{border-bottom:none}
        .student-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
        .mini-btn{border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;background:#eef2ff;color:#4f46e5}
        .mini-btn.primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .detail-panel{display:none;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-top:12px}
        .detail-panel.show{display:block}
        .section-title{font-size:14px;font-weight:800;color:#333;margin:12px 0 8px}
        .meal-row,.weight-row,.advice-row{background:#f8f9fa;border-radius:10px;padding:10px;margin-bottom:8px;font-size:13px;color:#444;line-height:1.45}
        .meal-row strong,.weight-row strong{color:#667eea}
        .advice-box{width:100%;min-height:70px;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:14px;margin-top:8px;resize:vertical}
        .hint{font-size:12px;color:#777;line-height:1.4;margin-top:6px}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <h1>👨‍🏫 教练后台</h1>
            <a href="index.html" class="logout-btn" onclick="logout()">登出</a>
        </div>
    </div>
    
    <div class="content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="studentCount">0</div>
                <div class="stat-label">活跃学生</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="monthlyIncome">RM 0</div>
                <div class="stat-label">本月收入</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" id="todaySessions">0</div>
                <div class="stat-label">今日课程</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="coachRating">4.9</div>
                <div class="stat-label">评分</div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h3>👥 我的学生</h3>
            </div>
            <div id="studentList">
                <div class="empty-state">
                    <div class="empty-icon">👥</div>
                    <div>暂无学生</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h3>📅 今日课程</h3>
            </div>
            <div id="scheduleList">
                <div class="empty-state">
                    <div class="empty-icon">📅</div>
                    <div>暂无课程</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item active"><span class="nav-icon">📊</span>后台</div>
        <div class="nav-item" onclick="window.location.href='coach_calendar.html'"><span class="nav-icon">📅</span>日历</div>
        <div class="nav-item" onclick="window.location.href='coach_profile.html'"><span class="nav-icon">👤</span>我的</div>
    </div>
    
    <script>
        let coachSession=null;
        const db=window.firebaseApp.db;
        
        function checkLogin(){
            coachSession=JSON.parse(localStorage.getItem('coachSession'));
            if(!coachSession){
                window.location.href='coach_direct_login.html';
            }
        }
        
        function logout(){
            localStorage.removeItem('coachSession');
            window.location.href='index.html';
        }
        
        function escapeHtml(text){
            return String(text||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        async function ensureFirebaseAuth(){
            if(window.firebaseApp.auth.currentUser)return;
            try{
                await window.firebaseApp.auth.signInAnonymously();
            }catch(err){
                console.warn('匿名登录失败，可能未启用 Anonymous Auth:',err);
            }
        }

        async function loadStudents(){
            try{
                await ensureFirebaseAuth();
                const studentsSnapshot=await db.collection('students')
                    .where('coachName','==',coachSession.name)
                    .where('status','==','active')
                    .get();
                
                const students=studentsSnapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
                document.getElementById('studentCount').textContent=students.length;
                document.getElementById('monthlyIncome').textContent='RM '+(students.length*99).toFixed(0);
                
                const studentList=document.getElementById('studentList');
                if(students.length===0){
                    studentList.innerHTML='<div class="empty-state"><div class="empty-icon">👥</div><div>暂无学生</div><div class="hint">学员在“浏览教练”选择你后，会出现在这里。</div></div>';
                    return;
                }
                
                studentList.innerHTML=students.map(student=>{
                    const name=student.userName||student.name||'未命名学员';
                    const email=student.userEmail||student.email||'';
                    const studentId=student.userId||student.id;
                    return `
                    <div class="student-item">
                        <div class="student-header">
                            <div>
                                <div class="student-name">${escapeHtml(name)}</div>
                                <div style="font-size:12px;color:#999;margin-top:3px">${escapeHtml(email||studentId)}</div>
                            </div>
                            <div class="student-booked">${student.joinDate?new Date(student.joinDate).toLocaleDateString('zh-MY'):'新学员'}</div>
                        </div>
                        <div class="student-stats" id="quickStats-${student.id}">
                            <div class="stat-item"><div class="stat-item-label">今日卡路里</div><div class="stat-item-value">--</div></div>
                            <div class="stat-item"><div class="stat-item-label">最新体重</div><div class="stat-item-value">--</div></div>
                            <div class="stat-item"><div class="stat-item-label">饮食记录</div><div class="stat-item-value">--</div></div>
                        </div>
                        <div class="student-actions">
                            <button class="mini-btn primary" onclick="toggleStudentDetail('${student.id}','${studentId}')">查看饮食/体重</button>
                            <button class="mini-btn" onclick="focusAdvice('${student.id}','${studentId}')">写建议</button>
                        </div>
                        <div class="detail-panel" id="detail-${student.id}">
                            <div class="hint">正在加载学员资料...</div>
                        </div>
                    </div>
                    `;
                }).join('');

                students.forEach(st=>loadStudentQuickStats(st.id, st.userId||st.id));
            }catch(error){
                console.error('加载学生失败:',error);
                document.getElementById('studentList').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><div>加载学生失败</div><div class="hint">'+escapeHtml(error.message)+'</div></div>';
            }
        }

        async function loadStudentQuickStats(rowId,userId){
            try{
                const today=new Date().toISOString().split('T')[0];
                const [mealsSnap,weightSnap]=await Promise.all([
                    db.collection('meals').where('userId','==',userId).where('date','==',today).get(),
                    db.collection('weights').where('userId','==',userId).orderBy('date','desc').limit(1).get()
                ]);
                let calories=0;
                mealsSnap.docs.forEach(doc=>calories+=doc.data().calories||0);
                const latestWeight=weightSnap.empty?'--':(weightSnap.docs[0].data().weight+'kg');
                document.getElementById('quickStats-'+rowId).innerHTML=`
                    <div class="stat-item"><div class="stat-item-label">今日卡路里</div><div class="stat-item-value">${calories}</div></div>
                    <div class="stat-item"><div class="stat-item-label">最新体重</div><div class="stat-item-value">${latestWeight}</div></div>
                    <div class="stat-item"><div class="stat-item-label">今日饮食</div><div class="stat-item-value">${mealsSnap.size} 条</div></div>
                `;
            }catch(err){
                console.warn('quick stats failed',err);
            }
        }

        async function toggleStudentDetail(rowId,userId){
            const panel=document.getElementById('detail-'+rowId);
            if(panel.classList.contains('show')){panel.classList.remove('show');return;}
            panel.classList.add('show');
            panel.innerHTML='<div class="hint">正在加载饮食、体重和建议...</div>';
            await loadStudentDetail(rowId,userId);
        }

        function focusAdvice(rowId,userId){
            const panel=document.getElementById('detail-'+rowId);
            if(!panel.classList.contains('show'))toggleStudentDetail(rowId,userId).then(()=>setTimeout(()=>document.getElementById('advice-'+rowId)?.focus(),100));
            else document.getElementById('advice-'+rowId)?.focus();
        }

        async function loadStudentDetail(rowId,userId){
            try{
                const today=new Date();
                const weekAgo=new Date(today.getTime()-7*24*60*60*1000).toISOString().split('T')[0];
                const [mealsSnap,weightsSnap,adviceSnap]=await Promise.all([
                    db.collection('meals').where('userId','==',userId).where('date','>=',weekAgo).get(),
                    db.collection('weights').where('userId','==',userId).orderBy('date','desc').limit(7).get(),
                    db.collection('coachAdvice').where('userId','==',userId).orderBy('createdAt','desc').limit(3).get()
                ]);
                const meals=mealsSnap.docs.map(doc=>({id:doc.id,...doc.data()})).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
                const weights=weightsSnap.docs.map(doc=>({id:doc.id,...doc.data()}));
                const advices=adviceSnap.docs.map(doc=>doc.data());
                const mealHtml=meals.length?meals.slice(0,10).map(m=>`<div class="meal-row"><strong>${escapeHtml(m.date)}</strong> ${escapeHtml(m.name)} · ${m.calories||0} kcal · P${m.protein||0} C${m.carbs||0} F${m.fat||0}${m.note?'<br>'+escapeHtml(m.note):''}</div>`).join(''):'<div class="hint">近 7 天暂无饮食记录</div>';
                const weightHtml=weights.length?weights.map(w=>`<div class="weight-row"><strong>${escapeHtml(w.date)}</strong> ${w.weight||'--'} kg</div>`).join(''):'<div class="hint">暂无体重记录</div>';
                const adviceHtml=advices.length?advices.map(a=>`<div class="advice-row">💬 ${escapeHtml(a.message)}<br><span style="font-size:12px;color:#999">${a.createdAt?new Date(a.createdAt).toLocaleString('zh-MY'):''}</span></div>`).join(''):'<div class="hint">还没有给过建议</div>';
                document.getElementById('detail-'+rowId).innerHTML=`
                    <div class="section-title">🍽️ 近 7 天饮食</div>${mealHtml}
                    <div class="section-title">⚖️ 最近体重</div>${weightHtml}
                    <div class="section-title">💬 已发送建议</div>${adviceHtml}
                    <div class="section-title">✍️ 给学员建议</div>
                    <textarea class="advice-box" id="advice-${rowId}" placeholder="例如：今天蛋白质不错，晚餐少饭多菜。"></textarea>
                    <button class="mini-btn primary" style="width:100%;margin-top:8px" onclick="sendAdvice('${rowId}','${userId}')">发送建议给学员</button>
                `;
            }catch(err){
                document.getElementById('detail-'+rowId).innerHTML='<div class="hint">加载失败：'+escapeHtml(err.message)+'</div>';
            }
        }

        async function sendAdvice(rowId,userId){
            const input=document.getElementById('advice-'+rowId);
            const message=input.value.trim();
            if(!message){alert('请先输入建议');return;}
            try{
                await db.collection('coachAdvice').add({
                    userId:userId,
                    coachId:coachSession.id,
                    coachName:coachSession.name,
                    message:message,
                    createdAt:new Date().toISOString(),
                    read:false
                });
                alert('✅ 已发送给学员');
                await loadStudentDetail(rowId,userId);
            }catch(err){
                alert('发送失败：'+err.message);
            }
        }

        async function loadSchedule(){
            try{
                const today=new Date().toISOString().split('T')[0];
                const sessionsSnapshot=await db.collection('sessions')
                    .where('coachId','==',coachSession.id)
                    .where('date','==',today)
                    .get();
                
                const todaySessions=sessionsSnapshot.docs.map(doc=>({id:doc.id,...doc.data()}));
                document.getElementById('todaySessions').textContent=todaySessions.length;
                
                const scheduleList=document.getElementById('scheduleList');
                if(todaySessions.length===0){
                    scheduleList.innerHTML='<div class="empty-state"><div class="empty-icon">📅</div><div>暂无课程</div></div>';
                    return;
                }
                
                scheduleList.innerHTML=todaySessions.map(session=>`
                    <div class="schedule-item">
                        <div style="width:80px;font-size:13px;color:#666">${session.time}</div>
                        <div style="flex:1">
                            <div style="color:#333;font-size:14px;font-weight:600">${session.type}</div>
                            <div style="font-size:12px;color:#999">${session.studentName}</div>
                        </div>
                    </div>
                `).join('');
            }catch(error){
                console.error('加载课程失败:',error);
            }
        }
        
        checkLogin();
        loadStudents();
        loadSchedule();
    </script>
</body>
</html>
