<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康管家</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 10px;
        }
        
        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            margin-bottom: 50px;
            text-align: center;
        }
        
        .welcome-text {
            color: white;
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 500;
        }
        
        .role-cards {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }
        
        .role-card {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .role-card:active {
            transform: scale(0.95);
        }
        
        .role-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        
        .role-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .role-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }
        
        .login-link {
            margin-top: 40px;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 15px;
            padding: 12px 30px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        .login-link:active {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="logo">💪</div>
    <h1>健康管家</h1>
    <p class="subtitle">你的私人健康顾问</p>
    
    <p class="welcome-text">👋 欢迎！请选择你的角色</p>
    
    <div class="role-cards">
        <div class="role-card" onclick="selectRole('student')">
            <div class="role-icon">👤</div>
            <div class="role-title">学员</div>
            <div class="role-desc">记录饮食<br>追踪进度<br>找教练</div>
        </div>
        
        <div class="role-card" onclick="selectRole('coach')">
            <div class="role-icon">👨‍🏫</div>
            <div class="role-title">教练</div>
            <div class="role-desc">管理学生<br>安排课程<br>追踪收入</div>
        </div>
    </div>
    
    <a href="login.html" class="login-link">已有账号？立即登入</a>
    
    <script>
        function selectRole(role) {
            localStorage.setItem('userRole', role);
            if (role === 'student') {
                window.location.href = 'app.html';
            } else {
                window.location.href = 'coach_dashboard.html';
            }
        }
    </script>
</body>
</html>
