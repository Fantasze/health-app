<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览教练 - 健康管家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            padding-bottom: 70px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 20px 80px;
        }
        .header h1 { font-size: 22px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .content { padding: 20px; margin-top: -60px; }
        
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            color: #666;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }
        .filter-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .coach-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .coach-top {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .coach-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-right: 15px;
        }
        .coach-info { flex: 1; }
        .coach-name { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 3px; }
        .coach-rating { color: #ffc107; font-size: 14px; }
        .coach-specialty { color: #999; font-size: 13px; margin-bottom: 10px; }
        .coach-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .coach-stat {
            text-align: center;
        }
        .coach-stat-value { font-size: 18px; font-weight: 700; color: #667eea; }
        .coach-stat-label { font-size: 11px; color: #999; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }
        .nav-item {
            text-align: center;
            color: #999;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-item.active { color: #667eea; }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="header">
        <h1>👨‍🏫 浏览教练</h1>
        <p>找到适合你的专业教练</p>
    </div>
    
    <div class="content">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterCoaches('全部', this)">全部</button>
            <button class="filter-btn" onclick="filterCoaches('增肌', this)">增肌</button>
            <button class="filter-btn" onclick="filterCoaches('减脂', this)">减脂</button>
            <button class="filter-btn" onclick="filterCoaches('塑形', this)">塑形</button>
            <button class="filter-btn" onclick="filterCoaches('瑜伽', this)">瑜伽</button>
        </div>
        
        <div class="coach-card" data-specialty="增肌 减脂 塑形">
            <div class="coach-top">
                <div class="coach-avatar">张</div>
                <div class="coach-info">
                    <div class="coach-name">张教练</div>
                    <div class="coach-rating">⭐⭐⭐⭐⭐ 5.0 (120 评价)</div>
                </div>
            </div>
            <div class="coach-specialty">擅长：增肌、减脂、塑形 · 8 年经验</div>
            <div class="coach-stats">
                <div class="coach-stat">
                    <div class="coach-stat-value">200+</div>
                    <div class="coach-stat-label">学员</div>
                </div>
                <div class="coach-stat">
                    <div class="coach-stat-value">RM 299</div>
                    <div class="coach-stat-label">/月</div>
                </div>
                <div class="coach-stat">
                    <div class="coach-stat-value">98%</div>
                    <div class="coach-stat-label">好评率</div>
                </div>
            </div>
            <button class="btn" onclick="selectCoach('张教练')">选择教练</button>
        </div>
        
        <div class="coach-card" data-specialty="瑜伽 塑形">
            <div class="coach-top">
                <div class="coach-avatar">李</div>
                <div class="coach-info">
                    <div class="coach-name">李教练</div>
                    <div class="coach-rating">⭐⭐⭐⭐⭐ 4.9 (85 评价)</div>
                </div>
            </div>
            <div class="coach-specialty">擅长：瑜伽、普拉提、产后恢复 · 5 年经验</div>
            <div class="coach-stats">
                <div class="coach-stat">
                    <div class="coach-stat-value">150+</div>
                    <div class="coach-stat-label">学员</div>
                </div>
                <div class="coach-stat">
                    <div class="coach-stat-value">RM 249</div>
                    <div class="coach-stat-label">/月</div>
                </div>
                <div class="coach-stat">
                    <div class="coach-stat-value">96%</div>
                    <div class="coach-stat-label">好评率</div>
                </div>
            </div>
            <button class="btn btn-outline" onclick="selectCoach('李教练')">选择教练</button>
        </div>
        
        <div class="coach-card" data-specialty="减脂 营养指导">
            <div class="coach-top">
                <div class="coach-avatar">王</div>
                <div class="coach-info">
                    <div class="coach-name">王教练</div>
                    <div class="coach-rating">⭐⭐⭐⭐⭐ 4.8 (62 评价)</div>
                </div>
            </div>
            <div class="coach-specialty">擅长：减脂、有氧、营养指导 · 6 年经验</div>
            <div class="coach-stats">
                <div class="coach-stat">
                    <div class="coach-stat-value">100+</div>
                    <div class="coach-stat-label">学员</div>
                </div>
                <div class="coach-stat">
                    <div class="coach-stat-value">RM 199</div>
                    <div class="coach-stat-label">/月</div>
                </div>
                <div class="coach-stat">
                    <div class="coach-stat-value">95%</div>
                    <div class="coach-stat-label">好评率</div>
                </div>
            </div>
            <button class="btn btn-outline" onclick="selectCoach('王教练')">选择教练</button>
        </div>
    </div>
    
    <div class="nav-bar">
        <a href="app.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            首页
        </a>
        <a href="diet.html" class="nav-item">
            <span class="nav-icon">🍽️</span>
            饮食
        </a>
        <a href="stats.html" class="nav-item">
            <span class="nav-icon">📊</span>
            统计
        </a>
        <a href="profile.html" class="nav-item active">
            <span class="nav-icon">👤</span>
            我的
        </a>
    </div>
    
    <div id="coachList" style="margin-top:15px"></div>
    
    <script>
        const db=window.firebaseApp?.db;
        let currentCoachFilter='全部';

        function filterCoaches(category, btn){
            currentCoachFilter=category;
            document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
            if(btn)btn.classList.add('active');
            document.querySelectorAll('.coach-card').forEach(card=>{
                const spec=card.getAttribute('data-specialty')||card.textContent;
                card.style.display=(category==='全部'||spec.includes(category))?'block':'none';
            });
        }
        
        async function loadCoaches(){
            if(!db){
                console.warn('Firebase 未初始化，显示本地示例教练');
                return;
            }
            try{
                const snapshot=await db.collection('coaches')
                    .where('status','==','approved')
                    .orderBy('joinDate','desc')
                    .get();
                
                const list=document.getElementById('coachList');
                
                if(snapshot.empty){
                    list.innerHTML='<div style="text-align:center;padding:30px;color:#999">暂无教练</div>';
                    return;
                }
                
                let html='';
                snapshot.docs.forEach(doc=>{
                    const coach=doc.data();
                    const specialties=coach.specialties?coach.specialties.join('、'):'通用健身';
                    
                    html+=`
                        <div class="coach-card" data-specialty="${specialties}">
                            <div class="coach-top">
                                <div class="coach-avatar">${coach.name.charAt(0)}</div>
                                <div class="coach-info">
                                    <div class="coach-name">${coach.name}</div>
                                    <div class="coach-rating">⭐⭐⭐⭐⭐ ${coach.rating||5.0} (${coach.students?coach.students.length:0} 评价)</div>
                                    <div style="font-size:12px;color:#999;margin-top:3px">📍 ${coach.region||'全国'}</div>
                                </div>
                            </div>
                            <div class="coach-specialty">擅长：${specialties}</div>
                            <div class="coach-stats">
                                <div class="coach-stat">
                                    <div class="coach-stat-value">${coach.students?coach.students.length:0}+</div>
                                    <div class="coach-stat-label">学员</div>
                                </div>
                                <div class="coach-stat">
                                    <div class="coach-stat-value">RM ${coach.monthlyRate||'N/A'}</div>
                                    <div class="coach-stat-label">/月</div>
                                </div>
                                <div class="coach-stat">
                                    <div class="coach-stat-value">${((coach.rating||5)*20).toFixed(0)}%</div>
                                    <div class="coach-stat-label">好评率</div>
                                </div>
                            </div>
                            <button class="btn" onclick="selectCoach('${coach.name}')">选择教练</button>
                        </div>
                    `;
                });
                
                list.innerHTML=html;
                filterCoaches(currentCoachFilter, document.querySelector('.filter-btn.active'));
                
            }catch(error){
                console.error('加载教练失败:',error);
                document.getElementById('coachList').innerHTML='<div style="text-align:center;padding:30px;color:#ef4444">加载失败：'+error.message+'</div>';
            }
        }
        
        async function selectCoach(name){
            const userSession=JSON.parse(localStorage.getItem('userSession'));
            
            if(!userSession){
                alert('请先登录！');
                window.location.href='login.html';
                return;
            }
            
            try{
                const db=window.firebaseApp.db;
                
                // 1. 保存到本地
                localStorage.setItem('myCoach',name);
                
                // 2. 保存到 Firebase - 学员记录
                await db.collection('students').add({
                    userId:userSession.id,
                    userName:userSession.name,
                    userEmail:userSession.email,
                    coachName:name,
                    joinDate:new Date().toISOString(),
                    status:'active'
                });
                
                // 3. 更新教练的学生列表
                const coachSnapshot=await db.collection('coaches')
                    .where('name','==',name)
                    .get();
                
                if(!coachSnapshot.empty){
                    const coachDoc=coachSnapshot.docs[0];
                    const coachData=coachDoc.data();
                    const students=coachData.students||[];
                    
                    students.push({
                        userId:userSession.id,
                        userName:userSession.name,
                        joinDate:new Date().toISOString()
                    });
                    
                    await db.collection('coaches').doc(coachDoc.id).update({
                        students:students
                    });
                }
                
                alert('✅ 已选择 '+name+' 作为你的教练！\n教练现在可以看到你的进度了。');
                window.location.href='app.html';
                
            }catch(error){
                alert('❌ 选择教练失败：'+error.message);
                console.error('选择教练错误:',error);
            }
        }
        
        loadCoaches();
    </script>
</body>
</html>
