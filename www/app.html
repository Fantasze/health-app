<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康管家 - 学员</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px 80px;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }
        .nav-item {
            text-align: center;
            color: #999;
            font-size: 12px;
            cursor: pointer;
        }
        .nav-item.active { color: #667eea; }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 3px; }
        .content {
            padding: 20px;
            margin-top: -60px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .card h3 { color: #333; margin-bottom: 10px; font-size: 18px; }
        .card p { color: #666; font-size: 14px; line-height: 1.6; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-item {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .stat-value { font-size: 24px; font-weight: 700; color: #667eea; }
        .stat-label { font-size: 12px; color: #999; margin-top: 5px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👋 欢迎回来！</h1>
        <p>今天也要保持健康哦</p>
    </div>
    
    <div class="content">
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="calories">0</div>
                <div class="stat-label">卡路里</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="water">0</div>
                <div class="stat-label">杯水</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="days">0</div>
                <div class="stat-label">坚持天数</div>
            </div>
        </div>
        
        <div class="card">
            <h3>🍽️ 今日饮食</h3>
            <p>记录今天的饮食，追踪营养摄入</p>
            <button class="btn" onclick="alert('饮食记录功能开发中')">记录饮食</button>
        </div>
        
        <div class="card">
            <h3>💪 训练计划</h3>
            <p>查看你的专属训练计划</p>
            <button class="btn" onclick="alert('训练计划功能开发中')">查看计划</button>
        </div>
        
        <div class="card">
            <h3>👨‍🏫 我的教练</h3>
            <p>需要专业指导？找教练帮你</p>
            <button class="btn" onclick="window.location.href='browse_coaches.html'">浏览教练</button>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item active">
            <span class="nav-icon">🏠</span>
            首页
        </div>
        <div class="nav-item">
            <span class="nav-icon">📊</span>
            统计
        </div>
        <div class="nav-item">
            <span class="nav-icon">👤</span>
            我的
        </div>
    </div>
    
    <script>
        // 初始化数据
        document.getElementById('calories').textContent = localStorage.getItem('calories') || 0;
        document.getElementById('water').textContent = localStorage.getItem('water') || 0;
        document.getElementById('days').textContent = localStorage.getItem('days') || 1;
    </script>
</body>
</html>
