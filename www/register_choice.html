<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <title>📝 注册 - 健康管家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --secondary: #FF9800;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #666;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .back-btn:hover {
            color: var(--primary);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo .icon {
            font-size: 4em;
            display: block;
        }
        .logo h1 {
            color: var(--primary);
            font-size: 1.8em;
            margin-top: 10px;
        }
        .logo p {
            color: #666;
            margin-top: 5px;
        }
        .role-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }
        .role-card {
            background: #f8f9fa;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .role-card:hover {
            border-color: var(--primary);
            background: #e8f5e9;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(76,175,80,0.2);
        }
        .role-card .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .role-card h2 {
            color: var(--text);
            font-size: 1.4em;
            margin-bottom: 10px;
        }
        .role-card p {
            color: #666;
            font-size: 0.9em;
            line-height: 1.5;
        }
        .role-card .features {
            margin-top: 15px;
            text-align: left;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }
        .role-card .features li {
            list-style: none;
            padding: 5px 0;
            color: #666;
            font-size: 0.85em;
        }
        .role-card .features li:before {
            content: "✓ ";
            color: var(--primary);
            font-weight: bold;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            position: relative;
        }
        .divider:before,
        .divider:after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }
        .divider:before { left: 0; }
        .divider:after { right: 0; }
        .btn-back {
            width: 100%;
            padding: 15px;
            background: #e0e0e0;
            color: #666;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-back:active {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="splash.html" class="back-btn">
            <span>←</span>
            <span>返回</span>
        </a>

        <div class="logo">
            <span class="icon">📝</span>
            <h1>欢迎加入健康管家</h1>
            <p>请选择您的身份开始注册</p>
        </div>

        <div class="role-cards">
            <!-- 用户注册 -->
            <div class="role-card" onclick="registerStudent()">
                <span class="icon">👤</span>
                <h2>我是学员</h2>
                <p>记录饮食、获取运动计划、追踪健康进度</p>
                <ul class="features">
                    <li>✅ 饮食记录与热量追踪</li>
                    <li>✅ 个性化运动计划</li>
                    <li>✅ 进度图表与报告</li>
                    <li>✅ 与教练实时沟通</li>
                </ul>
            </div>

            <!-- 教练注册 -->
            <div class="role-card" onclick="registerCoach()">
                <span class="icon">👨‍🏫</span>
                <h2>我是教练</h2>
                <p>管理学员、安排课程、增加收入</p>
                <ul class="features">
                    <li>✅ 学员管理与追踪</li>
                    <li>✅ 课程表编排</li>
                    <li>✅ 收入统计</li>
                    <li>✅ 待确认课程申请</li>
                </ul>
            </div>
        </div>

        <div style="text-align: center; margin-top: 20px; color: #999; font-size: 0.85em;">
            <p>已有账号？<a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">立即登入</a></p>
        </div>
    </div>

    <script>
        function registerStudent() {
            console.log('👤 用户注册');
            window.location.href = 'student_register.html';
        }

        function registerCoach() {
            console.log('👨‍🏫 教练注册 - 申请页面');
            window.location.href = 'coach_apply.html';
        }

        function goBack() {
            window.location.href = 'splash.html';
        }
    </script>
</body>
</html>
