<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>饮食记录 - 健康管家</title>
<link rel="stylesheet" href="common.css">
<style>
*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f6fa;margin:0;padding-bottom:90px;color:#333}.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px}.content{padding:16px}.card{background:white;border-radius:15px;padding:16px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}.version{background:#dcfce7;color:#166534;border:2px solid #22c55e;padding:12px;border-radius:12px;font-weight:900;margin-bottom:12px}.err{background:#fee2e2;color:#991b1b;border-color:#ef4444}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.sum{text-align:center;background:#f8f9fa;border-radius:10px;padding:10px 4px}.sum b{display:block;color:#667eea;font-size:18px}label{font-weight:800;font-size:13px;display:block;margin:10px 0 5px}input,textarea,select{width:100%;padding:13px;border:1px solid #ddd;border-radius:10px;font-size:16px;background:white}textarea{min-height:60px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.save,.photoBtn{width:100%;border:0;border-radius:12px;padding:16px;background:#16a34a;color:white;font-size:17px;font-weight:900;margin-top:12px}.test{background:#f97316}.clear{background:#dc2626}.ai{background:#7c3aed}.photoGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.photoBtn{display:block;text-align:center;text-decoration:none;background:#2563eb}.small{font-size:12px;color:#666;line-height:1.4}.meal{border-left:4px solid #667eea;background:#f8f9fa;border-radius:10px;padding:12px;margin:8px 0}.meal-name{font-weight:900}.meal-meta{font-size:13px;color:#666;display:flex;justify-content:space-between;margin-top:5px}.preview{display:none;margin-top:10px;border-radius:12px;overflow:hidden;background:#f8f9fa}.preview img{width:100%;max-height:260px;object-fit:cover;display:block}.nutritionCard{background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:12px;margin-top:12px}.bigFood{font-size:20px;font-weight:900;color:#111827}.pill{display:inline-block;background:#eef2ff;color:#3730a3;padding:5px 9px;border-radius:999px;font-size:12px;margin-top:6px}.readonly{background:#f3f4f6;color:#374151}.nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -5px 20px rgba(0,0,0,.1);z-index:100}.nav-item{text-align:center;color:#999;font-size:11px;text-decoration:none}.nav-item.active{color:#667eea}.nav-icon{font-size:22px;display:block;margin-bottom:2px}
</style>
</head>
<body>
<div class="header"><h2>🍽️ AI 饮食记录</h2></div>
<div class="content">
  <div id="status" class="version">v7.22 静态页面已打开；等待 JS 启动...</div>
  <div class="card"><h3>今日总计</h3><div class="grid4"><div class="sum"><b id="cal">0</b><span>卡路里</span></div><div class="sum"><b id="pro">0g</b><span>蛋白质</span></div><div class="sum"><b id="carb">0g</b><span>碳水</span></div><div class="sum"><b id="fat">0g</b><span>脂肪</span></div></div><div class="small" id="countInfo" style="margin-top:10px">记录数：0</div></div>
  <div class="card"><h3>📷 拍照 / 上传 / AI 自动计算</h3><div class="photoGrid"><label class="photoBtn" for="cameraInput">📷 拍照</label><label class="photoBtn" for="uploadInput">🖼️ 上传</label></div><input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none"><input id="uploadInput" type="file" accept="image/*" style="display:none"><div class="preview" id="preview"><img id="previewImg"></div><label>也可以直接输入食物，例如：一碗饭、2颗鸡蛋、一份鸡饭</label><input id="textFood" placeholder="例如：一碗白饭"><label>Gemini API Key（测试版，保存在本机）</label><input id="apiKey" type="password" placeholder="输入 Gemini API Key"><button id="saveKeyBtn" class="save ai">保存 API Key</button><button id="aiBtn" class="save ai">AI 自动识别并计算营养</button><p class="small">AI 会自动填入单位/数量/卡路里/蛋白质/碳水/脂肪。用户确认后只需要按储存。</p></div>
  <div class="card"><h3>AI 识别结果</h3><label>食物名称</label><input id="name" placeholder="等待 AI 识别"><div class="row2"><div><label>数量</label><input id="qty" type="number" step="0.1" value="1"></div><div><label>单位</label><select id="unit"><option>份</option><option>碗</option><option>颗</option><option>克</option><option>杯</option><option>片</option><option>汤匙</option><option>包</option><option>条</option><option>个</option></select></div></div><div class="nutritionCard"><div class="bigFood" id="foodTitle">还没有 AI 结果</div><div class="pill" id="unitText">请先拍照/上传/输入食物</div><div class="grid4" style="margin-top:10px"><div class="sum"><b id="rCal">0</b><span>kcal</span></div><div class="sum"><b id="rPro">0g</b><span>蛋白质</span></div><div class="sum"><b id="rCarb">0g</b><span>碳水</span></div><div class="sum"><b id="rFat">0g</b><span>脂肪</span></div></div></div><div class="row2"><div><label>AI 卡路里</label><input id="kcal" class="readonly" type="number" readonly value="0"></div><div><label>AI 蛋白质 g</label><input id="protein" class="readonly" type="number" readonly value="0"></div></div><div class="row2"><div><label>AI 碳水 g</label><input id="carbs" class="readonly" type="number" readonly value="0"></div><div><label>AI 脂肪 g</label><input id="fats" class="readonly" type="number" readonly value="0"></div></div><label>AI 说明</label><textarea id="note" readonly class="readonly">AI 估算结果会出现在这里</textarea><label>AI 调试信息</label><textarea id="aiDebug" readonly class="readonly">如果识别失败，这里会显示原因</textarea><button id="saveBtn" class="save">储存这份饮食</button><button id="testBtn" class="save test">测试：一碗白饭</button><button id="clearBtn" class="save clear">清空今日记录</button></div>
  <div class="card"><h3>今日饮食列表</h3><div id="list"></div></div>
</div>
<div class="nav-bar"><a href="app.html" class="nav-item"><span class="nav-icon">🏠</span>首页</a><div class="nav-item active"><span class="nav-icon">🍽️</span>饮食</div><a href="stats.html" class="nav-item"><span class="nav-icon">📊</span>统计</a><a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>我的</a></div>
<script>
(function(){
  var today=(new Date()).toISOString().split('T')[0]; var imageData='';
  function E(id){return document.getElementById(id);} function safe(t){return String(t||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
  function status(t,bad){var s=E('status');if(!s){return;}s.className='version'+(bad?' err':'');s.innerHTML=t;}
  function key(){return 'diet_records_v22_'+today;} function get(){try{return JSON.parse(localStorage.getItem(key())||'[]');}catch(e){return [];}} function set(a){localStorage.setItem(key(),JSON.stringify(a));}
  function num(id){return parseFloat(E(id).value)||0;}
  function applyResult(o){E('name').value=o.name||'AI识别食物';E('qty').value=o.quantity||1;setUnit(o.unit||'份');E('kcal').value=Math.round(o.calories||0);E('protein').value=Math.round(o.protein||0);E('carbs').value=Math.round(o.carbs||0);E('fats').value=Math.round(o.fat||0);E('note').value=o.note||'AI估算，仅供参考';refreshResult();}
  function setUnit(u){var sel=E('unit');for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===u||sel.options[i].text===u){sel.selectedIndex=i;return;}}var opt=document.createElement('option');opt.text=u;opt.value=u;sel.add(opt);sel.value=u;}
  function refreshResult(){var n=E('name').value||'未命名食物',q=E('qty').value||1,u=E('unit').value;E('foodTitle').innerHTML=safe(n);E('unitText').innerHTML=safe(q+' '+u+' 的 AI 估算营养');E('rCal').innerHTML=Math.round(num('kcal'));E('rPro').innerHTML=Math.round(num('protein'))+'g';E('rCarb').innerHTML=Math.round(num('carbs'))+'g';E('rFat').innerHTML=Math.round(num('fats'))+'g';}
  function readForm(){return {id:'r'+Date.now(),date:today,name:E('name').value||'未命名食物',quantity:num('qty')||1,unit:E('unit').value||'份',calories:Math.round(num('kcal')),protein:Math.round(num('protein')),carbs:Math.round(num('carbs')),fat:Math.round(num('fats')),note:E('note').value||'',imageData:imageData,source:'ai',createdAt:(new Date()).toISOString()};}
  function save(){if(!E('name').value||num('kcal')<=0){status('请先让 AI 识别/计算，再储存。',true);return;}var a=get();var rec=readForm();a.push(rec);set(a);status('已储存：'+safe(rec.quantity+' '+rec.unit+' '+rec.name)+'；记录数 '+a.length,false);render();}
  function test(){applyResult({name:'白饭',quantity:1,unit:'碗',calories:260,protein:5,carbs:57,fat:1,note:'测试：一碗熟白饭约 200g，AI估算。'});status('测试结果已填入：一碗白饭。按储存加入记录。',false);}
  function clear(){localStorage.removeItem(key());status('v7.22 已清空今日记录',false);render();}
  function render(){var a=get();var c=0,p=0,cb=0,f=0,html='';for(var i=0;i<a.length;i++){var m=a[i];c+=m.calories||0;p+=m.protein||0;cb+=m.carbs||0;f+=m.fat||0;html+='<div class="meal">';if(m.imageData){html+='<img src="'+m.imageData+'" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:8px">';}html+='<div class="meal-name">'+safe((m.quantity||1)+' '+(m.unit||'份')+' '+m.name)+'</div><div class="meal-meta"><span>P'+(m.protein||0)+' C'+(m.carbs||0)+' F'+(m.fat||0)+'</span><b>'+(m.calories||0)+' kcal</b></div><div class="small">'+safe(m.note||'')+'</div></div>';}E('cal').innerHTML=c;E('pro').innerHTML=p+'g';E('carb').innerHTML=cb+'g';E('fat').innerHTML=f+'g';E('countInfo').innerHTML='v7.22 本机记录数：'+a.length;E('list').innerHTML=html||'<div class="small">暂无饮食记录</div>';}
  function compress(dataUrl,cb){var img=new Image();img.onload=function(){var max=900;var scale=Math.min(1,max/Math.max(img.width,img.height));var canvas=document.createElement('canvas');canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);cb(canvas.toDataURL('image/jpeg',0.65));};img.onerror=function(){cb(dataUrl);};img.src=dataUrl;}
  function handleFile(input){var file=input.files&&input.files[0];if(!file){return;}var r=new FileReader();r.onload=function(){compress(r.result,function(out){imageData=out;E('previewImg').src=imageData;E('preview').style.display='block';status('照片已读取，按 AI 自动识别并计算营养。',false);});};r.onerror=function(){status('读取图片失败',true);};r.readAsDataURL(file);input.value='';}
  function saveKey(){var k=E('apiKey').value;if(!k){status('请先输入 Gemini API Key',true);return;}localStorage.setItem('geminiApiKey',k);E('apiKey').value='';status('Gemini API Key 已保存到本机。',false);}
  function setDebug(t){try{E('aiDebug').value=String(t||'');}catch(e){}}
  function parseAiJson(text){text=String(text||'').replace(/```json/gi,'').replace(/```/g,'').trim();var m=text.match(/\{[\s\S]*\}/);if(!m){throw new Error('AI没有返回JSON：'+text.slice(0,180));}return JSON.parse(m[0]);}
  function localFoodFallback(q){q=String(q||'').toLowerCase();var map=[[/白饭|米饭|饭|rice/,{name:'白饭',quantity:1,unit:'碗',calories:260,protein:5,carbs:57,fat:1,note:'本机估算：一碗熟白饭约200g'}],[/鸡蛋|蛋|egg/,{name:'鸡蛋',quantity:2,unit:'颗',calories:140,protein:12,carbs:1,fat:10,note:'本机估算：2颗鸡蛋'}],[/鸡饭|chicken rice/,{name:'鸡饭',quantity:1,unit:'份',calories:607,protein:28,carbs:72,fat:22,note:'本机估算：一份海南鸡饭'}],[/面|mee|noodle/,{name:'面',quantity:1,unit:'份',calories:430,protein:15,carbs:65,fat:12,note:'本机估算：一份面食'}]];for(var i=0;i<map.length;i++){if(map[i][0].test(q)){return map[i][1];}}return null;}
  function aiDetect(){var k=(localStorage.getItem('geminiApiKey')||E('apiKey').value||'').trim();var textFood=(E('textFood').value||'').trim();if(!k){status('请先输入并保存 Gemini API Key',true);setDebug('没有检测到 Gemini API Key');return;}if(!imageData&&!textFood){status('请先拍照/上传，或输入食物文字，例如：一碗饭',true);setDebug('没有图片，也没有文字输入');return;}status('AI 正在识别，请等 5-15 秒...',false);setDebug('开始请求 Gemini...\n文字：'+(textFood||'(无)')+'\n图片：'+(imageData?'有':'无'));
    var prompt='你是马来西亚健康饮食App的营养识别助手。请根据照片或文字识别食物。必须用用户常用单位衡量，例如 克、碗、份、颗、杯、片、汤匙、包、条、个。估算该数量的总营养。只输出合法JSON，不要markdown，不要解释。JSON格式:{"name":"白饭","quantity":1,"unit":"碗","calories":260,"protein":5,"carbs":57,"fat":1,"note":"一碗熟白饭约200g，AI估算"}。如果是多个食物，合并成一份餐点，例如 鸡饭/经济饭/早餐。用户文字：'+(textFood||'无');
    var parts=[{text:prompt}];if(imageData){var mm=String(imageData).match(/^data:(image\/[^;]+);base64,(.+)$/);if(mm){parts.push({inline_data:{mime_type:mm[1],data:mm[2]}});}else{setDebug('图片base64格式不正确');}}
    var body={contents:[{role:'user',parts:parts}],generationConfig:{temperature:0.2,response_mime_type:'application/json'}};
    var models=['gemini-1.5-flash','gemini-2.0-flash','gemini-1.5-flash-latest'];var idx=0;
    function callNext(lastErr){if(idx>=models.length){var fb=localFoodFallback(textFood);if(fb){applyResult(fb);status('Gemini失败，已用本机食物库估算。',true);setDebug('Gemini全部失败：'+lastErr+'\n已使用本机fallback。');return;}status('AI识别失败：'+lastErr,true);setDebug('Gemini全部失败：'+lastErr);return;}var model=models[idx++];var xhr=new XMLHttpRequest();var url='https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+encodeURIComponent(k);xhr.open('POST',url,true);xhr.timeout=30000;xhr.setRequestHeader('Content-Type','application/json');xhr.onreadystatechange=function(){if(xhr.readyState!==4){return;}try{var raw=xhr.responseText||'';setDebug('模型：'+model+'\nHTTP：'+xhr.status+'\n返回：'+raw.slice(0,1200));var data=JSON.parse(raw||'{}');if(xhr.status<200||xhr.status>=300){callNext((data.error&&data.error.message)||('HTTP '+xhr.status));return;}var out='',ps=data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts;if(ps){for(var i=0;i<ps.length;i++){out+=ps[i].text||'';}}if(!out){callNext('模型没有文字返回');return;}var obj=parseAiJson(out);applyResult(obj);status('AI 已识别并计算好，确认后按储存。',false);setDebug('成功模型：'+model+'\nAI原文：'+out);}catch(e){callNext(e.message);}};xhr.ontimeout=function(){callNext('请求超时');};xhr.onerror=function(){callNext('网络/CORS错误，无法连接 Gemini');};xhr.send(JSON.stringify(body));}
    callNext('');}
  function bind(){E('saveBtn').onclick=save;E('testBtn').onclick=test;E('clearBtn').onclick=clear;E('saveKeyBtn').onclick=saveKey;E('aiBtn').onclick=aiDetect;E('cameraInput').onchange=function(){handleFile(this);};E('uploadInput').onchange=function(){handleFile(this);};E('name').oninput=refreshResult;E('qty').oninput=refreshResult;E('unit').onchange=refreshResult;}
  try{if(localStorage.getItem('geminiApiKey')){E('apiKey').placeholder='API Key 已保存，可直接识别';}status('v7.22 JS 已启动 ✅ AI识别增强版',false);bind();refreshResult();render();}catch(e){status('v7.22 JS 错误：'+safe(e.message),true);alert('v7.22 JS 错误：'+e.message);}
})();
</script>
</body>
</html>
