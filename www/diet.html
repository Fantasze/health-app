<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>饮食记录 - 健康管家</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <link rel="stylesheet" href="common.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;min-height:100vh;padding-bottom:74px;color:#333}
    .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px}.header h1{font-size:20px}
    .content{padding:20px}.card{background:white;border-radius:15px;padding:20px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,.08)}.card h3{font-size:17px;margin-bottom:15px}
    .date-selector{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.date-btn{background:white;border:1px solid #ddd;padding:8px 15px;border-radius:8px;font-size:14px}.date-today{background:#667eea;color:white;border:none}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.summary-item{text-align:center;padding:12px 6px;background:#f8f9fa;border-radius:10px}.summary-value{font-size:18px;font-weight:800;color:#667eea}.summary-label{font-size:11px;color:#999;margin-top:5px}
    .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.action-btn{border:none;border-radius:12px;padding:15px 10px;font-size:15px;font-weight:800;background:#eef2ff;color:#4f46e5}.action-btn.hot{background:linear-gradient(135deg,#f97316 0%,#ef4444 100%);color:white}.add-btn{width:100%;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:800;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;margin:8px 0 15px}
    .quick-foods{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.food-chip{border:1px solid #e5e7eb;background:#fff;border-radius:12px;padding:12px;text-align:left}.food-chip strong{display:block;font-size:14px;margin-bottom:4px}.food-chip span{font-size:12px;color:#667eea;font-weight:700}
    .meal-item{border-left:4px solid #667eea;padding:15px;background:#f8f9fa;border-radius:8px;margin-bottom:10px}.meal-name{font-size:16px;font-weight:800;margin-bottom:5px}.meal-info{display:flex;justify-content:space-between;font-size:13px;color:#666}.meal-calories{color:#667eea;font-weight:800}.delete-meal{border:none;background:#fee2e2;color:#dc2626;padding:7px 12px;border-radius:8px;font-size:12px;margin-top:10px}
    .empty-state{text-align:center;padding:34px;color:#999}.empty-icon{font-size:44px;margin-bottom:10px}.status{display:none;background:#f0f9ff;color:#075985;border-left:4px solid #0ea5e9;padding:12px;border-radius:10px;margin-bottom:12px;font-size:13px;line-height:1.45}.status.error{background:#fef2f2;color:#991b1b;border-left-color:#ef4444}
    .preview{display:none;border-radius:12px;overflow:hidden;margin:10px 0;background:#f8f9fa}.preview img{width:100%;max-height:240px;object-fit:cover;display:block}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:999;padding:14px}.modal.show{display:flex}.modal-card{background:white;border-radius:20px 20px 14px 14px;padding:18px;width:100%;max-width:460px;max-height:90vh;overflow:auto}.modal-title{font-size:18px;font-weight:900;margin-bottom:12px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form-group{margin-bottom:12px}.form-group.full{grid-column:1/-1}.form-group label{display:block;font-size:13px;font-weight:800;color:#555;margin-bottom:6px}.form-group input,.form-group textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px}.form-group textarea{min-height:70px}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.modal-btn{border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:900;background:#e5e7eb}.modal-btn.save{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
    .nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -5px 20px rgba(0,0,0,.1);z-index:100}.nav-item{text-align:center;color:#999;font-size:11px;text-decoration:none}.nav-item.active{color:#667eea}.nav-icon{font-size:22px;display:block;margin-bottom:2px}
  </style>
</head>
<body>
  <div class="header"><h1>🍽️ 饮食记录</h1></div>
  <div class="content">
    <div class="status" id="statusBox"></div>
    <div class="card">
      <div class="date-selector"><button class="date-btn" id="prevDayBtn">◀ 前一天</button><span id="currentDate" style="font-weight:800"></span><button class="date-btn date-today" id="todayBtn">今天</button></div>
      <div class="summary"><div class="summary-item"><div class="summary-value" id="totalCalories">0</div><div class="summary-label">卡路里</div></div><div class="summary-item"><div class="summary-value" id="totalProtein">0g</div><div class="summary-label">蛋白质</div></div><div class="summary-item"><div class="summary-value" id="totalCarbs">0g</div><div class="summary-label">碳水</div></div><div class="summary-item"><div class="summary-value" id="totalFat">0g</div><div class="summary-label">脂肪</div></div></div>
    </div>
    <div class="card">
      <h3>添加饮食</h3>
      <div class="action-grid"><button class="action-btn hot" id="cameraBtn">📷 拍照识别</button><button class="action-btn" id="uploadBtn">🖼️ 上传照片</button></div>
      <button class="add-btn" id="manualBtn">+ 手动添加饮食</button>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="uploadInput" accept="image/*" style="display:none">
      <div class="preview" id="preview"><img id="previewImg" alt="食物照片"></div>
      <div id="aiHint" style="font-size:13px;color:#666;line-height:1.5">测试版：拍照/上传后会打开编辑表单；如已保存 Gemini API Key，会尝试 AI 估算。</div>
    </div>
    <div class="card"><h3>🇲🇾 常用食物</h3><div class="quick-foods" id="quickFoods"></div></div>
    <div class="card"><h3>今日饮食</h3><div id="mealList"><div class="empty-state"><div class="empty-icon">🍽️</div><div>暂无饮食记录</div></div></div></div>
  </div>
  <div class="modal" id="mealModal"><div class="modal-card"><div class="modal-title" id="modalTitle">添加饮食</div><div class="form-grid"><div class="form-group full"><label>食物名称</label><input id="mealName" placeholder="例如：鸡饭 / Nasi Lemak"></div><div class="form-group"><label>卡路里 kcal</label><input id="mealCalories" type="number" inputmode="numeric"></div><div class="form-group"><label>蛋白质 g</label><input id="mealProtein" type="number" inputmode="numeric"></div><div class="form-group"><label>碳水 g</label><input id="mealCarbs" type="number" inputmode="numeric"></div><div class="form-group"><label>脂肪 g</label><input id="mealFat" type="number" inputmode="numeric"></div><div class="form-group full"><label>备注</label><textarea id="mealNote" placeholder="可选"></textarea></div></div><div class="modal-actions"><button class="modal-btn" id="cancelBtn">取消</button><button class="modal-btn save" id="saveBtn">保存</button></div></div></div>
  <div class="nav-bar"><a href="app.html" class="nav-item"><span class="nav-icon">🏠</span>首页</a><div class="nav-item active"><span class="nav-icon">🍽️</span>饮食</div><a href="stats.html" class="nav-item"><span class="nav-icon">📊</span>统计</a><a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>我的</a></div>
  <script>
    let db=null,userSession=null,currentDate=new Date().toISOString().split('T')[0],pendingSource='manual',pendingImage='';
    const foods=[{name:'Nasi Lemak',calories:644,protein:16,carbs:80,fat:28},{name:'Roti Canai',calories:301,protein:7,carbs:45,fat:10},{name:'Chicken Rice 鸡饭',calories:607,protein:28,carbs:72,fat:22},{name:'Char Kuey Teow',calories:744,protein:23,carbs:90,fat:32},{name:'Economy Rice 经济饭',calories:650,protein:30,carbs:75,fat:24},{name:'Teh Tarik',calories:160,protein:4,carbs:28,fat:4}];
    function $(id){return document.getElementById(id)}
    function msg(t,err=false){const b=$('statusBox');b.style.display='block';b.className='status'+(err?' error':'');b.textContent=t;}
    function esc(t){return String(t||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
    function init(){try{db=window.firebaseApp&&window.firebaseApp.db;userSession=JSON.parse(localStorage.getItem('userSession')||'null');if(!userSession){location.href='index.html';return;}bind();renderDate();renderFoods();loadMeals();if(!db)msg('Firebase 未连接：会先保存到本机测试记录。',true);}catch(e){msg('饮食页启动失败：'+e.message,true)}}
    function bind(){ $('cameraBtn').addEventListener('click',()=>$('cameraInput').click());$('uploadBtn').addEventListener('click',()=>$('uploadInput').click());$('manualBtn').addEventListener('click',()=>openModal('manual'));$('cancelBtn').addEventListener('click',closeModal);$('saveBtn').addEventListener('click',saveMeal);$('prevDayBtn').addEventListener('click',()=>changeDate(-1));$('todayBtn').addEventListener('click',()=>{currentDate=new Date().toISOString().split('T')[0];renderDate();loadMeals();});$('cameraInput').addEventListener('change',handleFile);$('uploadInput').addEventListener('change',handleFile);}
    function renderDate(){const d=new Date(currentDate);$('currentDate').textContent=d.toDateString()===new Date().toDateString()?'今天':currentDate}
    function changeDate(n){const d=new Date(currentDate);d.setDate(d.getDate()+n);currentDate=d.toISOString().split('T')[0];renderDate();loadMeals()}
    function renderFoods(){$('quickFoods').innerHTML=foods.map((f,i)=>`<button class="food-chip" data-i="${i}"><strong>${esc(f.name)}</strong><span>${f.calories} kcal · P${f.protein} C${f.carbs} F${f.fat}</span></button>`).join('');document.querySelectorAll('.food-chip').forEach(b=>b.addEventListener('click',()=>addMeal(foods[Number(b.dataset.i)],'library')))}
    function openModal(source,meal={}){pendingSource=source;$('modalTitle').textContent=source==='ai'?'AI/照片识别结果':'手动添加饮食';$('mealName').value=meal.name||'';$('mealCalories').value=meal.calories||'';$('mealProtein').value=meal.protein||'';$('mealCarbs').value=meal.carbs||'';$('mealFat').value=meal.fat||'';$('mealNote').value=meal.note||'';$('mealModal').classList.add('show');setTimeout(()=>$('mealName').focus(),100)}
    function closeModal(){$('mealModal').classList.remove('show')}
    function handleFile(e){const file=e.target.files&&e.target.files[0];if(!file)return;const r=new FileReader();r.onload=async()=>{pendingImage=await compress(r.result);$('previewImg').src=pendingImage;$('preview').style.display='block';msg('照片已读取，可以确认/修改后保存。');try{const meal=await aiDetect(pendingImage);openModal('ai',meal)}catch(_){openModal('photo',{note:'已附上食物照片，请手动填写。'})}};r.readAsDataURL(file);e.target.value=''}
    function compress(dataUrl){return new Promise(res=>{const img=new Image();img.onload=()=>{const max=900,scale=Math.min(1,max/Math.max(img.width,img.height)),c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);c.getContext('2d').drawImage(img,0,0,c.width,c.height);res(c.toDataURL('image/jpeg',.62))};img.onerror=()=>res(dataUrl);img.src=dataUrl})}
    async function aiDetect(dataUrl){const key=localStorage.getItem('geminiApiKey');if(!key)throw new Error('no key');const m=String(dataUrl).match(/^data:(image\/[^;]+);base64,(.+)$/);if(!m)throw new Error('bad image');const prompt='识别照片中的主要食物并估算营养，只输出JSON: {"name":"","calories":0,"protein":0,"carbs":0,"fat":0,"note":"AI估算"}';const resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:m[1],data:m[2]}}]}]})});const data=await resp.json();if(!resp.ok)throw new Error(data.error?.message||'AI失败');const text=data.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'';const obj=JSON.parse((text.match(/\{[\s\S]*\}/)||[text])[0]);return {name:obj.name||'AI识别食物',calories:+obj.calories||0,protein:+obj.protein||0,carbs:+obj.carbs||0,fat:+obj.fat||0,note:obj.note||'AI估算'}}
    function saveMeal(){const meal={name:$('mealName').value.trim(),calories:+$('mealCalories').value||0,protein:+$('mealProtein').value||0,carbs:+$('mealCarbs').value||0,fat:+$('mealFat').value||0,note:$('mealNote').value.trim()};if(!meal.name){alert('请输入食物名称');return;}addMeal(meal,pendingSource).then(closeModal)}
    async function addMeal(meal,source){const record={userId:userSession.id,date:currentDate,...meal,source:source||'manual',imageDataUrl:pendingImage||'',createdAt:new Date().toISOString()};if(db){try{await db.collection('meals').add(record);pendingImage='';msg('已保存饮食记录。');loadMeals();return;}catch(e){msg('Firebase 保存失败，已保存到本机：'+e.message,true)}}const key='local_meals_'+currentDate;const list=JSON.parse(localStorage.getItem(key)||'[]');list.push({...record,id:'local-'+Date.now()});localStorage.setItem(key,JSON.stringify(list));pendingImage='';loadMeals()}
    async function loadMeals(){let meals=[];if(db&&userSession){try{const snap=await db.collection('meals').where('userId','==',userSession.id).where('date','==',currentDate).get();meals=snap.docs.map(d=>({id:d.id,...d.data()}));}catch(e){msg('读取云端饮食失败：'+e.message,true)}}meals=meals.concat(JSON.parse(localStorage.getItem('local_meals_'+currentDate)||'[]'));let c=0,p=0,carb=0,f=0;meals.forEach(m=>{c+=+m.calories||0;p+=+m.protein||0;carb+=+m.carbs||0;f+=+m.fat||0});$('totalCalories').textContent=c;$('totalProtein').textContent=p+'g';$('totalCarbs').textContent=carb+'g';$('totalFat').textContent=f+'g';$('mealList').innerHTML=meals.length?meals.map(m=>`<div class="meal-item">${m.imageDataUrl?`<img src="${m.imageDataUrl}" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px">`:''}<div class="meal-name">${esc(m.name)}</div><div class="meal-info"><span>${m.protein||0}g 蛋白质 | ${m.carbs||0}g 碳水 | ${m.fat||0}g 脂肪</span><span class="meal-calories">${m.calories||0} kcal</span></div>${m.note?`<div style="font-size:12px;color:#666;margin-top:8px">${esc(m.note)}</div>`:''}</div>`).join(''):'<div class="empty-state"><div class="empty-icon">🍽️</div><div>暂无饮食记录</div></div>'}
    document.addEventListener('DOMContentLoaded',init);
  </script>
</body>
</html>
