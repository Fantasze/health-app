<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饮食记录 - 健康管家</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth_utils.js"></script>
    <link rel="stylesheet" href="common.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f6fa;min-height:100vh;padding-bottom:70px}
        .header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:20px}
        .header h1{font-size:20px}
        .content{padding:20px}
        .card{background:white;border-radius:15px;padding:20px;margin-bottom:15px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
        .card h3{color:#333;font-size:17px;margin-bottom:15px}
        .add-btn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;padding:15px;border-radius:10px;font-size:16px;font-weight:600;width:100%;cursor:pointer;margin-bottom:20px}
        .meal-item{border-left:4px solid #667eea;padding:15px;background:#f8f9fa;border-radius:8px;margin-bottom:10px}
        .meal-name{font-size:16px;font-weight:600;color:#333;margin-bottom:5px}
        .meal-info{display:flex;justify-content:space-between;font-size:13px;color:#666}
        .meal-calories{color:#667eea;font-weight:600}
        .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
        .summary-item{text-align:center;padding:15px;background:#f8f9fa;border-radius:10px}
        .summary-value{font-size:20px;font-weight:700;color:#667eea}
        .summary-label{font-size:11px;color:#999;margin-top:5px}
        .nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -5px 20px rgba(0,0,0,0.1);z-index:100}
        .nav-item{text-align:center;color:#999;font-size:11px;cursor:pointer;text-decoration:none}
        .nav-item.active{color:#667eea}
        .nav-icon{font-size:22px;display:block;margin-bottom:2px}
        .empty-state{text-align:center;padding:40px;color:#999}
        .empty-icon{font-size:48px;margin-bottom:10px}
        .date-selector{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .date-btn{background:white;border:1px solid #ddd;padding:8px 15px;border-radius:8px;font-size:14px;cursor:pointer}
        .date-today{background:#667eea;color:white;border:none}
        .quick-foods{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
        .food-chip{border:1px solid #e5e7eb;background:#fff;border-radius:12px;padding:12px;text-align:left;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
        .food-chip strong{display:block;color:#333;font-size:14px;margin-bottom:4px}
        .food-chip span{font-size:12px;color:#667eea;font-weight:600}
        .tools-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
        .tool-btn{border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;background:#eef2ff;color:#4f46e5}
        .advice-box{margin-top:15px;padding:14px;border-radius:12px;background:#f0fdf4;color:#166534;font-size:14px;line-height:1.5;border-left:4px solid #22c55e}
        .delete-meal{border:none;background:#fee2e2;color:#dc2626;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:10px}
        .ai-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
        .ai-btn{border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
        .ai-btn.primary{background:linear-gradient(135deg,#f97316 0%,#ef4444 100%);color:white;border:none}
        .photo-preview{display:none;margin-top:12px;border-radius:12px;overflow:hidden;background:#f8f9fa;border:1px solid #eee}
        .photo-preview img{width:100%;display:block;max-height:260px;object-fit:cover}
        .ai-status{font-size:13px;color:#666;margin-top:10px;line-height:1.5}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:999;padding:14px}
        .modal.show{display:flex}
        .modal-card{background:white;border-radius:20px 20px 14px 14px;padding:18px;width:100%;max-width:460px;max-height:90vh;overflow:auto;box-shadow:0 20px 50px rgba(0,0,0,.25)}
        .modal-title{font-size:18px;font-weight:800;color:#333;margin-bottom:6px}
        .modal-subtitle{font-size:13px;color:#666;margin-bottom:14px;line-height:1.5}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .form-group{margin-bottom:12px}
        .form-group.full{grid-column:1/-1}
        .form-group label{display:block;font-size:13px;font-weight:700;color:#555;margin-bottom:6px}
        .form-group input,.form-group textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:15px;outline:none}
        .form-group textarea{min-height:70px;resize:vertical}
        .modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
        .modal-btn{border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;background:#e5e7eb;color:#333}
        .modal-btn.save{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
        .api-key-row{display:none;grid-template-columns:1fr auto;gap:8px;margin-top:10px}
        .api-key-row input{padding:11px;border:1px solid #ddd;border-radius:10px;font-size:13px;min-width:0}
        .api-key-row button{border:none;background:#111827;color:white;border-radius:10px;padding:0 12px;font-weight:700}
        .api-help{display:none;font-size:12px;color:#666;margin-top:6px;line-height:1.4}
    </style>
</head>
<body>
    <div class="header">
        <h1>🍽️ 饮食记录</h1>
    </div>
    
    <div class="content">
        <div class="card">
            <div class="date-selector">
                <button class="date-btn" onclick="changeDate(-1)">◀ 前一天</button>
                <span id="currentDate" style="font-weight:600"></span>
                <button class="date-btn date-today" onclick="goToToday()">今天</button>
            </div>
            
            <div class="summary">
                <div class="summary-item">
                    <div class="summary-value" id="totalCalories">0</div>
                    <div class="summary-label">卡路里</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="totalProtein">0g</div>
                    <div class="summary-label">蛋白质</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="totalCarbs">0g</div>
                    <div class="summary-label">碳水</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="totalFat">0g</div>
                    <div class="summary-label">脂肪</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3>🇲🇾 常用食物快捷添加</h3>
            <div class="quick-foods" id="quickFoods"></div>
            <div class="ai-actions">
                <button class="ai-btn primary" onclick="captureFoodPhoto()">📷 拍照 AI 识别</button>
                <button class="ai-btn" onclick="chooseFoodPhoto()">🖼️ 上传照片识别</button>
            </div>
            <input type="file" id="foodImageInput" accept="image/*" style="display:none" onchange="handleImageFile(event)">
            <div class="photo-preview" id="photoPreview"><img id="photoPreviewImg" alt="食物照片预览"></div>
            <div class="ai-status" id="aiStatus"></div>
            <div class="api-key-row" id="apiKeyRow">
                <input type="password" id="geminiApiKeyInput" placeholder="Gemini API Key，用于AI识别">
                <button onclick="saveGeminiApiKey()">保存</button>
            </div>
            <div class="api-help" id="apiHelp">第一次使用 AI 识别需要 Gemini API Key；保存后只存在这台手机。</div>
            <div class="tools-row">
                <button class="tool-btn" onclick="copyYesterdayMeals()">复制昨天饮食</button>
                <button class="tool-btn" onclick="openMealModal('manual')">手动添加</button>
            </div>
            <div class="advice-box" id="dietAdvice">记录今天第一餐后，我会给你简单建议。</div>
        </div>
        
        <button class="add-btn" onclick="openMealModal('manual')">+ 手动添加饮食</button>
        
        <div class="card">
            <h3>今日饮食</h3>
            <div id="mealList">
                <div class="empty-state">
                    <div class="empty-icon">🍽️</div>
                    <div>暂无饮食记录</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="mealModal">
        <div class="modal-card">
            <div class="modal-title" id="mealModalTitle">添加饮食</div>
            <div class="modal-subtitle" id="mealModalSubtitle">填写后保存；AI 识别结果也可以先修改再保存。</div>
            <div class="form-grid">
                <div class="form-group full">
                    <label>食物名称</label>
                    <input type="text" id="mealName" placeholder="例如：鸡饭 / Nasi Lemak">
                </div>
                <div class="form-group">
                    <label>卡路里 kcal</label>
                    <input type="number" id="mealCalories" placeholder="300" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>蛋白质 g</label>
                    <input type="number" id="mealProtein" placeholder="10" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>碳水 g</label>
                    <input type="number" id="mealCarbs" placeholder="30" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>脂肪 g</label>
                    <input type="number" id="mealFat" placeholder="8" inputmode="numeric">
                </div>
                <div class="form-group full">
                    <label>备注 / AI 说明</label>
                    <textarea id="mealNote" placeholder="可选，例如：半份饭、少油、估算自照片"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn" onclick="closeMealModal()">取消</button>
                <button class="modal-btn save" onclick="saveMealFromModal()">保存</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <a href="app.html" class="nav-item"><span class="nav-icon">🏠</span>首页</a>
        <div class="nav-item active"><span class="nav-icon">🍽️</span>饮食</div>
        <a href="stats.html" class="nav-item"><span class="nav-icon">📊</span>统计</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>我的</a>
    </div>
    
    <script>
        let userSession=null;
        let currentDate=new Date().toISOString().split('T')[0];
        const db=window.firebaseApp.db;
        
        function checkLogin(){
            userSession=JSON.parse(localStorage.getItem('userSession'));
            if(!userSession){
                window.location.href='index.html';
            }
        }
        
        function updateDateDisplay(){
            const date=new Date(currentDate);
            const today=new Date();
            const isToday=date.toDateString()===today.toDateString();
            document.getElementById('currentDate').textContent=isToday?'今天':currentDate;
        }
        
        function changeDate(days){
            const date=new Date(currentDate);
            date.setDate(date.getDate()+days);
            currentDate=date.toISOString().split('T')[0];
            updateDateDisplay();
            loadMeals();
        }
        
        function goToToday(){
            currentDate=new Date().toISOString().split('T')[0];
            updateDateDisplay();
            loadMeals();
        }
        
        const FOOD_LIBRARY=[
            {name:'Nasi Lemak',calories:644,protein:16,carbs:80,fat:28},
            {name:'Roti Canai',calories:301,protein:7,carbs:45,fat:10},
            {name:'Chicken Rice 鸡饭',calories:607,protein:28,carbs:72,fat:22},
            {name:'Char Kuey Teow',calories:744,protein:23,carbs:90,fat:32},
            {name:'Mee Goreng',calories:660,protein:20,carbs:88,fat:25},
            {name:'Economy Rice 经济饭',calories:650,protein:30,carbs:75,fat:24},
            {name:'Teh Tarik',calories:160,protein:4,carbs:28,fat:4},
            {name:'Kopi O Kosong',calories:5,protein:0,carbs:1,fat:0}
        ];

        function escapeHtml(text){
            return String(text||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }

        function renderQuickFoods(){
            const box=document.getElementById('quickFoods');
            box.innerHTML=FOOD_LIBRARY.map((food,idx)=>`
                <button class="food-chip" onclick="addFoodFromLibrary(${idx})">
                    <strong>${escapeHtml(food.name)}</strong>
                    <span>${food.calories} kcal · P${food.protein} C${food.carbs} F${food.fat}</span>
                </button>
            `).join('');
        }

        function addFoodFromLibrary(index){
            const food=FOOD_LIBRARY[index];
            if(!food)return;
            addMealToDb(food,'library');
        }

        let pendingMealSource='manual';
        let pendingImageDataUrl='';

        function openMealModal(source, meal){
            pendingMealSource=source||'manual';
            document.getElementById('mealModalTitle').textContent=source==='ai'?'AI 识别结果':'手动添加饮食';
            document.getElementById('mealModalSubtitle').textContent=source==='ai'?'AI 已经帮你估算，保存前可以修改。':'填写食物和营养资料后保存。';
            fillMealForm(meal||{});
            document.getElementById('mealModal').classList.add('show');
            setTimeout(()=>document.getElementById('mealName').focus(),100);
        }

        function fillMealForm(meal){
            document.getElementById('mealName').value=meal.name||'';
            document.getElementById('mealCalories').value=meal.calories??'';
            document.getElementById('mealProtein').value=meal.protein??'';
            document.getElementById('mealCarbs').value=meal.carbs??'';
            document.getElementById('mealFat').value=meal.fat??'';
            document.getElementById('mealNote').value=meal.note||'';
        }

        function closeMealModal(){
            document.getElementById('mealModal').classList.remove('show');
        }

        function saveMealFromModal(){
            const food={
                name:document.getElementById('mealName').value.trim(),
                calories:parseInt(document.getElementById('mealCalories').value)||0,
                protein:parseInt(document.getElementById('mealProtein').value)||0,
                carbs:parseInt(document.getElementById('mealCarbs').value)||0,
                fat:parseInt(document.getElementById('mealFat').value)||0,
                note:document.getElementById('mealNote').value.trim()
            };
            if(!food.name){alert('请输入食物名称');return;}
            if(food.calories<=0&&!confirm('卡路里是 0，确定保存？'))return;
            addMealToDb(food,pendingMealSource).then(closeMealModal);
        }

        function addMealToDb(food,source){
            return db.collection('meals').add({
                userId:userSession.id,
                date:currentDate,
                name:food.name,
                calories:food.calories||0,
                protein:food.protein||0,
                carbs:food.carbs||0,
                fat:food.fat||0,
                note:food.note||'',
                imageDataUrl:source==='ai'&&pendingImageDataUrl?pendingImageDataUrl:'',
                source:source||'manual',
                createdAt:new Date()
            }).then(()=>{
                document.getElementById('aiStatus').textContent='已保存饮食记录。';
                loadMeals();
            }).catch(err=>{
                alert('添加失败：'+err.message);
            });
        }

        async function captureFoodPhoto(){
            await getFoodImage('camera');
        }

        async function chooseFoodPhoto(){
            if(window.Capacitor?.Plugins?.Camera){
                await getFoodImage('photos');
            }else{
                document.getElementById('foodImageInput').click();
            }
        }

        async function getFoodImage(source){
            try{
                const Camera=window.Capacitor?.Plugins?.Camera;
                if(!Camera){
                    if(source==='camera')document.getElementById('foodImageInput').setAttribute('capture','environment');
                    document.getElementById('foodImageInput').click();
                    return;
                }
                const photo=await Camera.getPhoto({
                    quality:80,
                    allowEditing:false,
                    resultType:'dataUrl',
                    source:source==='camera'?'CAMERA':'PHOTOS'
                });
                if(photo?.dataUrl)await analyzeFoodImage(await compressImageDataUrl(photo.dataUrl));
            }catch(err){
                if(err?.message&&!/cancel/i.test(err.message))alert('读取照片失败：'+err.message);
            }
        }

        function handleImageFile(event){
            const file=event.target.files&&event.target.files[0];
            if(!file)return;
            const reader=new FileReader();
            reader.onload=async()=>analyzeFoodImage(await compressImageDataUrl(reader.result));
            reader.readAsDataURL(file);
            event.target.value='';
        }


        function compressImageDataUrl(dataUrl,maxSize=900,quality=0.62){
            return new Promise(resolve=>{
                const img=new Image();
                img.onload=()=>{
                    const scale=Math.min(1,maxSize/Math.max(img.width,img.height));
                    const canvas=document.createElement('canvas');
                    canvas.width=Math.round(img.width*scale);
                    canvas.height=Math.round(img.height*scale);
                    const ctx=canvas.getContext('2d');
                    ctx.drawImage(img,0,0,canvas.width,canvas.height);
                    resolve(canvas.toDataURL('image/jpeg',quality));
                };
                img.onerror=()=>resolve(dataUrl);
                img.src=dataUrl;
            });
        }

        function showPreview(dataUrl){
            pendingImageDataUrl=dataUrl;
            document.getElementById('photoPreviewImg').src=dataUrl;
            document.getElementById('photoPreview').style.display='block';
        }

        async function analyzeFoodImage(dataUrl){
            showPreview(dataUrl);
            const status=document.getElementById('aiStatus');
            status.textContent='正在用 AI 识别食物和估算营养...';
            try{
                const meal=await detectFoodWithGemini(dataUrl);
                status.textContent='AI 识别完成。请确认资料后保存。';
                openMealModal('ai',meal);
            }catch(err){
                console.error(err);
                status.textContent='AI 识别暂时失败：'+err.message+'。你可以手动填写保存。';
                openMealModal('manual',{note:'照片已上传，AI 识别失败，可手动填写。'});
            }
        }

        function saveGeminiApiKey(){
            const input=document.getElementById('geminiApiKeyInput');
            const key=input.value.trim();
            if(!key){alert('请先输入 Gemini API Key');return;}
            localStorage.setItem('geminiApiKey',key);
            document.getElementById('apiKeyRow').style.display='none';
            document.getElementById('apiHelp').style.display='none';
            document.getElementById('aiStatus').textContent='AI Key 已保存，可以重新选择照片识别。';
            input.value='';
        }

        function requestGeminiApiKey(){
            document.getElementById('apiKeyRow').style.display='grid';
            document.getElementById('apiHelp').style.display='block';
            setTimeout(()=>document.getElementById('geminiApiKeyInput').focus(),100);
        }

        async function detectFoodWithGemini(dataUrl){
            let apiKey=localStorage.getItem('geminiApiKey')||'';
            if(!apiKey){
                requestGeminiApiKey();
                throw new Error('请先输入 Gemini API Key，然后再点拍照/上传识别');
            }
            const match=String(dataUrl).match(/^data:(image\/[^;]+);base64,(.+)$/);
            if(!match)throw new Error('照片格式不支持');
            const promptText=`你是马来西亚健康饮食 App 的营养识别助手。请根据照片识别主要食物，并估算一份的营养。只输出 JSON，不要 markdown。格式：{"name":"食物名，可中英混合","calories":数字,"protein":数字,"carbs":数字,"fat":数字,"note":"简短说明，注明这是AI估算"}`;
            const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+encodeURIComponent(apiKey.trim()),{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({contents:[{parts:[{text:promptText},{inline_data:{mime_type:match[1],data:match[2]}}]}]})
            });
            const data=await res.json();
            if(!res.ok)throw new Error(data.error?.message||'AI 请求失败');
            const text=data.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('').trim();
            if(!text)throw new Error('AI 没有返回结果');
            const jsonText=(text.match(/\{[\s\S]*\}/)||[text])[0];
            const meal=JSON.parse(jsonText);
            return {
                name:meal.name||'AI识别食物',
                calories:parseInt(meal.calories)||0,
                protein:parseInt(meal.protein)||0,
                carbs:parseInt(meal.carbs)||0,
                fat:parseInt(meal.fat)||0,
                note:meal.note||'AI 估算，仅供参考'
            };
        }

        async function copyYesterdayMeals(){
            const date=new Date(currentDate);
            date.setDate(date.getDate()-1);
            const yesterday=date.toISOString().split('T')[0];
            try{
                const snapshot=await db.collection('meals')
                    .where('userId','==',userSession.id)
                    .where('date','==',yesterday)
                    .get();
                if(snapshot.empty){
                    alert('昨天没有饮食记录可以复制');
                    return;
                }
                if(!confirm(`复制昨天 ${snapshot.size} 条饮食记录到今天？`))return;
                const batch=db.batch();
                snapshot.docs.forEach(doc=>{
                    const meal=doc.data();
                    const ref=db.collection('meals').doc();
                    batch.set(ref,{
                        userId:userSession.id,
                        date:currentDate,
                        name:meal.name,
                        calories:meal.calories||0,
                        protein:meal.protein||0,
                        carbs:meal.carbs||0,
                        fat:meal.fat||0,
                        source:'copied',
                        copiedFrom:yesterday,
                        createdAt:new Date()
                    });
                });
                await batch.commit();
                alert('已复制昨天饮食');
                loadMeals();
            }catch(err){
                alert('复制失败：'+err.message);
            }
        }

        async function deleteMeal(id){
            if(!confirm('删除这条饮食记录？'))return;
            try{
                await db.collection('meals').doc(id).delete();
                loadMeals();
            }catch(err){
                alert('删除失败：'+err.message);
            }
        }

        function updateAdvice(totalCal,totalPro,totalCarb,totalFat){
            const advice=document.getElementById('dietAdvice');
            if(!advice)return;
            const tips=[];
            if(totalCal===0){
                advice.textContent='记录今天第一餐后，我会给你简单建议。';
                return;
            }
            if(totalCal>2200)tips.push('今天卡路里偏高，晚餐建议清淡一点。');
            else if(totalCal<1200)tips.push('今天摄入偏低，记得补足蛋白质和正餐。');
            else tips.push('今天总热量暂时在合理范围。');
            if(totalPro<60)tips.push('蛋白质还可以再补一点，比如鸡胸、鱼、蛋或豆腐。');
            if(totalCarb>260)tips.push('碳水偏高，下一餐可以少饭、多菜、多蛋白。');
            if(totalFat>80)tips.push('脂肪偏高，少炸物和奶茶会更稳。');
            advice.textContent=tips.join(' ');
        }

        async function loadMeals(){
            try{
                const snapshot=await db.collection('meals')
                    .where('userId','==',userSession.id)
                    .where('date','==',currentDate)
                    .orderBy('createdAt','desc')
                    .get();
                
                const list=document.getElementById('mealList');
                
                if(snapshot.empty){
                    list.innerHTML='<div class="empty-state"><div class="empty-icon">🍽️</div><div>暂无饮食记录</div></div>';
                    
                    document.getElementById('totalCalories').textContent='0';
                    document.getElementById('totalProtein').textContent='0g';
                    document.getElementById('totalCarbs').textContent='0g';
                    document.getElementById('totalFat').textContent='0g';
                    updateAdvice(0,0,0,0);
                    return;
                }
                
                let totalCal=0,totalPro=0,totalCarb=0,totalFat=0;
                let html='';
                
                snapshot.docs.forEach(doc=>{
                    const meal=doc.data();
                    totalCal+=meal.calories||0;
                    totalPro+=meal.protein||0;
                    totalCarb+=meal.carbs||0;
                    totalFat+=meal.fat||0;
                    
                    html+=`<div class="meal-item">
                        ${meal.imageDataUrl?`<img src="${meal.imageDataUrl}" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:10px" alt="食物照片">`:''}
                        <div class="meal-name">${escapeHtml(meal.name)}</div>
                        <div class="meal-info">
                            <span>${meal.protein||0}g 蛋白质 | ${meal.carbs||0}g 碳水 | ${meal.fat||0}g 脂肪</span>
                            <span class="meal-calories">${meal.calories||0} kcal</span>
                        </div>
                        ${meal.note?`<div style="font-size:12px;color:#666;margin-top:8px;line-height:1.4">${escapeHtml(meal.note)}</div>`:''}
                        <button class="delete-meal" onclick="deleteMeal('${doc.id}')">删除</button>
                    </div>`;
                });
                
                list.innerHTML=html;
                
                document.getElementById('totalCalories').textContent=totalCal;
                document.getElementById('totalProtein').textContent=totalPro+'g';
                document.getElementById('totalCarbs').textContent=totalCarb+'g';
                document.getElementById('totalFat').textContent=totalFat+'g';
                updateAdvice(totalCal,totalPro,totalCarb,totalFat);
                
            }catch(error){
                console.error('加载饮食失败:',error);
            }
        }
        
        checkLogin();
        renderQuickFoods();
        updateDateDisplay();
        loadMeals();
    </script>
</body>
</html>
