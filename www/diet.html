<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>饮食记录 - 健康管家</title>
<link rel="stylesheet" href="common.css">
<style>
*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:#f5f6fa;margin:0;padding-bottom:90px;color:#333}.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px}.content{padding:16px}.card{background:white;border-radius:15px;padding:16px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.08)}.version{background:#dcfce7;color:#166534;border:2px solid #22c55e;padding:12px;border-radius:12px;font-weight:900;margin-bottom:12px}.err{background:#fee2e2;color:#991b1b;border-color:#ef4444}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.sum{text-align:center;background:#f8f9fa;border-radius:10px;padding:10px 4px}.sum b{display:block;color:#667eea;font-size:18px}label{font-weight:800;font-size:13px;display:block;margin:10px 0 5px}input,textarea{width:100%;padding:13px;border:1px solid #ddd;border-radius:10px;font-size:16px}textarea{min-height:60px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.save,.photoBtn{width:100%;border:0;border-radius:12px;padding:16px;background:#16a34a;color:white;font-size:17px;font-weight:900;margin-top:12px}.test{background:#f97316}.clear{background:#dc2626}.ai{background:#7c3aed}.photoGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.photoBtn{display:block;text-align:center;text-decoration:none;background:#2563eb}.small{font-size:12px;color:#666;line-height:1.4}.meal{border-left:4px solid #667eea;background:#f8f9fa;border-radius:10px;padding:12px;margin:8px 0}.meal-name{font-weight:900}.meal-meta{font-size:13px;color:#666;display:flex;justify-content:space-between;margin-top:5px}.preview{display:none;margin-top:10px;border-radius:12px;overflow:hidden;background:#f8f9fa}.preview img{width:100%;max-height:260px;object-fit:cover;display:block}.nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:12px 0;box-shadow:0 -5px 20px rgba(0,0,0,.1);z-index:100}.nav-item{text-align:center;color:#999;font-size:11px;text-decoration:none}.nav-item.active{color:#667eea}.nav-icon{font-size:22px;display:block;margin-bottom:2px}
</style>
</head>
<body>
<div class="header"><h2>🍽️ 饮食记录</h2></div>
<div class="content">
  <div id="status" class="version">v7.20 静态页面已打开；等待 JS 启动...</div>
  <div class="card"><h3>今日总计</h3><div class="grid4"><div class="sum"><b id="cal">0</b><span>卡路里</span></div><div class="sum"><b id="pro">0g</b><span>蛋白质</span></div><div class="sum"><b id="carb">0g</b><span>碳水</span></div><div class="sum"><b id="fat">0g</b><span>脂肪</span></div></div><div class="small" id="countInfo" style="margin-top:10px">记录数：0</div></div>
  <div class="card"><h3>📷 拍照 / 上传 AI 识别</h3><div class="photoGrid"><label class="photoBtn" for="cameraInput">📷 拍照</label><label class="photoBtn" for="uploadInput">🖼️ 上传</label></div><input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none"><input id="uploadInput" type="file" accept="image/*" style="display:none"><div class="preview" id="preview"><img id="previewImg"></div><label>Gemini API Key（测试版，保存在本机）</label><input id="apiKey" type="password" placeholder="输入 Gemini API Key"><button id="saveKeyBtn" class="save ai">保存 API Key</button><button id="aiBtn" class="save ai">用 AI 识别照片并自动填表</button><p class="small">先拍照/上传照片，再按 AI 识别。AI 结果会填进下面表单，你确认后保存。</p></div>
  <div class="card"><h3>直接添加饮食</h3><label>食物名称</label><input id="name" value="鸡饭"><div class="row2"><div><label>卡路里 kcal</label><input id="kcal" type="number" value="607"></div><div><label>蛋白质 g</label><input id="protein" type="number" value="28"></div></div><div class="row2"><div><label>碳水 g</label><input id="carbs" type="number" value="72"></div><div><label>脂肪 g</label><input id="fats" type="number" value="22"></div></div><label>备注</label><textarea id="note">测试添加</textarea><button id="saveBtn" class="save">保存到饮食记录</button><button id="testBtn" class="save test">一键加入鸡饭并计算</button><button id="clearBtn" class="save clear">清空今日测试记录</button></div>
  <div class="card"><h3>今日饮食列表</h3><div id="list"></div></div>
</div>
<div class="nav-bar"><a href="app.html" class="nav-item"><span class="nav-icon">🏠</span>首页</a><div class="nav-item active"><span class="nav-icon">🍽️</span>饮食</div><a href="stats.html" class="nav-item"><span class="nav-icon">📊</span>统计</a><a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>我的</a></div>
<script>
(function(){
  var today=(new Date()).toISOString().split('T')[0]; var imageData='';
  function E(id){return document.getElementById(id);} function safe(t){return String(t||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
  function status(t,bad){var s=E('status');if(!s){return;}s.className='version'+(bad?' err':'');s.innerHTML=t;}
  function key(){return 'diet_records_v20_'+today;} function get(){try{return JSON.parse(localStorage.getItem(key())||'[]');}catch(e){return [];}} function set(a){localStorage.setItem(key(),JSON.stringify(a));}
  function readForm(){return {id:'r'+Date.now(),date:today,name:E('name').value||'未命名食物',calories:parseInt(E('kcal').value,10)||0,protein:parseInt(E('protein').value,10)||0,carbs:parseInt(E('carbs').value,10)||0,fat:parseInt(E('fats').value,10)||0,note:E('note').value||'',imageData:imageData,createdAt:(new Date()).toISOString()};}
  function save(){var a=get();var rec=readForm();a.push(rec);set(a);status('v7.20 已保存：'+safe(rec.name)+'；记录数 '+a.length,false);render();}
  function test(){E('name').value='鸡饭';E('kcal').value='607';E('protein').value='28';E('carbs').value='72';E('fats').value='22';E('note').value='一键测试';save();}
  function clear(){localStorage.removeItem(key());status('v7.20 已清空今日本机记录',false);render();}
  function render(){var a=get();var c=0,p=0,cb=0,f=0,html='';for(var i=0;i<a.length;i++){var m=a[i];c+=m.calories||0;p+=m.protein||0;cb+=m.carbs||0;f+=m.fat||0;html+='<div class="meal">';if(m.imageData){html+='<img src="'+m.imageData+'" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:8px">';}html+='<div class="meal-name">'+safe(m.name)+'</div><div class="meal-meta"><span>P'+(m.protein||0)+' C'+(m.carbs||0)+' F'+(m.fat||0)+'</span><b>'+(m.calories||0)+' kcal</b></div></div>';}E('cal').innerHTML=c;E('pro').innerHTML=p+'g';E('carb').innerHTML=cb+'g';E('fat').innerHTML=f+'g';E('countInfo').innerHTML='v7.20 本机记录数：'+a.length+'；key='+key();E('list').innerHTML=html||'<div class="small">暂无饮食记录</div>';}
  function compress(dataUrl,cb){var img=new Image();img.onload=function(){var max=900;var scale=Math.min(1,max/Math.max(img.width,img.height));var canvas=document.createElement('canvas');canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);cb(canvas.toDataURL('image/jpeg',0.65));};img.onerror=function(){cb(dataUrl);};img.src=dataUrl;}
  function handleFile(input){var file=input.files&&input.files[0];if(!file){return;}var r=new FileReader();r.onload=function(){compress(r.result,function(out){imageData=out;E('previewImg').src=imageData;E('preview').style.display='block';status('照片已读取，可以按 AI 识别或手动填表保存。',false);});};r.onerror=function(){status('读取图片失败',true);};r.readAsDataURL(file);input.value='';}
  function saveKey(){var k=E('apiKey').value;if(!k){status('请先输入 Gemini API Key',true);return;}localStorage.setItem('geminiApiKey',k);E('apiKey').value='';status('Gemini API Key 已保存到本机。',false);}
  function aiDetect(){var k=localStorage.getItem('geminiApiKey')||E('apiKey').value;if(!k){status('请先输入并保存 Gemini API Key',true);return;}if(!imageData){status('请先拍照或上传食物照片',true);return;}status('AI 正在识别，请稍等...',false);var m=String(imageData).match(/^data:(image\/[^;]+);base64,(.+)$/);if(!m){status('图片格式不支持',true);return;}var prompt='你是马来西亚健康饮食App的营养识别助手。根据照片识别主要食物并估算一份营养。只输出JSON，不要markdown。格式:{"name":"食物名","calories":数字,"protein":数字,"carbs":数字,"fat":数字,"note":"AI估算说明"}';var xhr=new XMLHttpRequest();xhr.open('POST','https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+encodeURIComponent(k),true);xhr.setRequestHeader('Content-Type','application/json');xhr.onreadystatechange=function(){if(xhr.readyState!==4){return;}try{var data=JSON.parse(xhr.responseText||'{}');if(xhr.status<200||xhr.status>=300){status('AI失败：'+((data.error&&data.error.message)||xhr.status),true);return;}var text='';var parts=data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts;if(parts){for(var i=0;i<parts.length;i++){text+=parts[i].text||'';}}var jsonText=(text.match(/\{[\s\S]*\}/)||[text])[0];var obj=JSON.parse(jsonText);E('name').value=obj.name||'AI识别食物';E('kcal').value=parseInt(obj.calories,10)||0;E('protein').value=parseInt(obj.protein,10)||0;E('carbs').value=parseInt(obj.carbs,10)||0;E('fats').value=parseInt(obj.fat,10)||0;E('note').value=obj.note||'AI估算，仅供参考';status('AI 已填好表单，请确认后保存。',false);}catch(e){status('AI结果解析失败：'+e.message,true);}};xhr.send(JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:m[1],data:m[2]}}]}]}));}
  function bind(){E('saveBtn').onclick=save;E('testBtn').onclick=test;E('clearBtn').onclick=clear;E('saveKeyBtn').onclick=saveKey;E('aiBtn').onclick=aiDetect;E('cameraInput').onchange=function(){handleFile(this);};E('uploadInput').onchange=function(){handleFile(this);};}
  try{var old=localStorage.getItem('geminiApiKey');if(old){E('apiKey').placeholder='API Key 已保存，可直接识别';}status('v7.20 JS 已启动 ✅ 相机/上传/AI 已加入',false);bind();render();}catch(e){status('v7.20 JS 错误：'+safe(e.message),true);alert('v7.20 JS 错误：'+e.message);}
})();
</script>
</body>
</html>
